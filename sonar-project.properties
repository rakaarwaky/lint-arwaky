# SonarQube Project Configuration
sonar.projectKey=lint-arwaky
sonar.projectName=Lint Arwaky
sonar.projectVersion=1.0.0

# Scan everything in the repository except excluded paths
sonar.sources=.

# Exclusions (Including test-workspaces and other cache/build folders)
sonar.exclusions=test-workspaces/**/*,**/node_modules/**/*,**/target/**/*,**/dist/**/*,**/.dsc_cache/**/*,**/.git/**/*,**/.jj/**/*

# File encoding
sonar.sourceEncoding=UTF-8
