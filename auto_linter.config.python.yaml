thresholds:
  score: 100.0
  complexity: 15

output_dir: "output"

adapters:
  - name: "ruff"
    weight: 1.0
  - name: "mypy"
    weight: 1.0
  - name: "bandit"
    weight: 1.0
  - name: "radon"
    weight: 1.0
  - name: "architecture"
    weight: 3.0

ignored_rules: []

ignored_paths:
  - "./output"
  - "/test project"
  - "/.git"
  - "/.github"
  - "/.venv"
  - "/.vscode"
  - "/__pycache__"
  - "*.pyc"
  - ".ipynb_checkpoints"
  - "/dist"
  - "/build"
  - "/scratch"
  - "/test-project-python"
  - "test-project-javascript"


architecture:
  enabled: true
  layers:
    root: 
      path: "src-python/"
      recursive: false
      suffix:
        - strict: ["entry"]
    taxonomy:
      path: "src-python/taxonomy"
      recursive: true
      suffix:
        - strict: ["vo", "entity", "error", "event", "bridge"]
    contract:
      recursive: true
      path: "src-python/contract"
      suffix:
        - strict: ["port", "protocol", "aggregate"]
    capabilities:
      recursive: true
      path: "src-python/capabilities"
      suffix:
        - flexible:
            [
              "analyzer", "actions", "formatters", "generator", "processor",
              "evaluator", "checker", "validator", "transformer", "calculator",
              "builder", "handler", "executor", "resolver", "compiler",
              "aggregator", "classifier", "extractor", "reporter", "mapper",
              "filter", "collector", "comparator", "scorer", "inspector",
              "reviewer", "assessor",
            ]
        - forbidden: ["vo", "entity", "error", "event", "port", "protocol", "io"]
    infrastructure:
      recursive: true
      path: "src-python/infrastructure"
      suffix:
        - flexible:
            [
              "adapter", "provider", "scanner", "client", "tracer", "tracker",
              "variants", "detector", "patterns", "util", "system", "repository",
              "cache", "store", "loader", "writer", "reader", "driver",
              "connector", "gateway", "serializer", "encoder", "decoder",
              "fetcher", "watcher", "indexer", "dispatcher", "recorder",
              "proxy", "publisher", "subscriber", "listener", "poller", "streamer",
            ]
        - forbidden: ["vo", "entity", "error", "event", "port", "protocol", "io"]
    surfaces:
      recursive: true
      path: "src-python/surfaces"
      suffix:
        - strict: [
            "page", "command", "handler", "controller", "router",
            "component", "layout", "view", "entry",
            "hook", "store", "provider"
          ]
       
    agent:
      path: "src-python/agent"
      recursive: true
      suffix:
        - strict:
            [
              "container", "manager", "orchestrator", "registry", "coordinator"
            ]

  rules:
    global:
      - name: "Forbid Any Type"
        forbid_any_type: true
        exceptions: ["__init__.py"]
        forbid_any_type_violation_message: >
          AES024 ANY_TYPE_BYPASS: `Any` type detected in code.
          WHY? Using `Any` bypasses type safety and conflicts with taxonomy Value Objects which require explicit types.
          FIX:
          1. Replace `Any` with specific taxonomy types (_vo, _entity) or abstract contract interfaces.
          2. Use `object` type if the logic is truly generic and does not require attribute access.
      - name: "Naming Convention"
        word_count: 3
        exceptions: ["__init__.py"]
        word_count_violation_message: >
          AES003 NAMING_CONVENTION: Filename does not follow the word1_word2_word3.py pattern.
          WHY? Strict three-word names ensure architectural consistency and prevent naming ambiguity.
          FIX:
          1. Rename the file to exactly three lowercase words separated by underscores (e.g., `user_data_vo.py`).
          2. Ensure the filename conveys the precise architectural role of the component.

      - name: "forbidden bypass / cheating"
        forbidden_bypass: ["# noqa", "# type: ignore"]
        exceptions: ["cli_config_templates.py"]
        forbidden_bypass_violation_message: >
          AES014 BYPASS_COMMENT_VIOLATION: Forbidden bypass comments (noqa, type: ignore) detected.
          WHY? Suppressing linter or type errors masks underlying design flaws and technical debt.
          FIX:
          1. Identify the underlying static analysis or type mismatch issue.
          2. Fix the code directly to adhere to the linter or type checker requirements instead of using suppression comments.
        forbidden_bypass_custom_messages:
          - pattern: "noqa"
            message: >
              AES014 BYPASS_COMMENT_VIOLATION: NOQA comment detected in source code.
              WHY? Linter errors must be resolved at the source to maintain code quality standards.
              FIX:
              1. Locate the linter rule that was violated on this line.
              2. Adjust the code logic to strictly satisfy the rule instead of ignoring it with `noqa`.
          - pattern: "type: ignore"
            message: >
              AES014 BYPASS_COMMENT_VIOLATION: type: ignore comment detected in source code.
              WHY? Type safety is mandatory for architectural integrity and preventing runtime failures.
              FIX:
              1. Trace the type definition and type checker mismatch on this line.
              2. Add proper type hints, unions, or type assertions instead of hiding the type error with `type: ignore`.

      - name: "Mandatory Class Definition"
        mandatory_class_definition: true
        exceptions: ["__init__.py", "cli_config_templates.py", "layer_names_vo.py", "mcp_constants_vo.py", "dispatch_commands_aggregate.py", "agent_mixin_aggregate.py"]
        mandatory_class_definition_violation_message: >
          AES009 MANDATORY_CLASS_DEFINITION: File is missing a class definition.
          WHY? Encapsulation in classes is required for proper dependency injection and contract adherence.
          FIX:
          1. Create a class inside this file with a name matching the filename role.
          2. Move standalone functions into this class as methods, ensuring proper instance state management or static/class method wrapping.

      - name: "Line Count Limits"
        min_lines: 10
        min_lines_violation_message: >
          AES005 FILE_TOO_SHORT: File contains fewer than 10 lines of code.
          WHY? Excessively small files clutter the project structure; logic should be merged into a parent module.
          FIX:
          1. Merge this class or function logic into a related parent module or sibling component.
          2. Expand the component to implement a more complete set of features under its contract.
        max_lines: 500
        max_lines_violation_message: >
          AES004 FILE_TOO_LARGE: File exceeds the 500-line limit.
          WHY? Large files violate the Single Responsibility Principle and are difficult to maintain or test.
          FIX:
          1. Identify high-level logical sub-responsibilities within this large file.
          2. Extract these responsibilities into new, smaller, and highly focused capability or infrastructure files.
        exceptions: ["__init__.py", "cli_config_templates.py", "cli_dev_command.py", "arch_role_checker.py", "arch_analyzer_protocol.py", "architecture_orchestrator_aggregate.py"]

      - name: "Dead Inheritance Bypass"
        dead_inheritance_bypass: true
        exceptions: ["__init__.py"]
        dead_inheritance_bypass_violation_message: >
          AES016 DEAD_INHERITANCE_BYPASS: Hollow class inheritance detected.
          WHY? Empty classes inheriting from contracts are used to bypass architectural enforcement logic.
          FIX:
          1. Implement the required contract methods directly inside the class.
          2. Remove the class entirely if it is no longer necessary.
        dead_inheritance_bypass_custom_messages:
          - pattern: "*Contract*"
            message: >
              AES016 CONTRACT_BYPASS: Class '{name}' uses 'Contract' in its name but is empty.
              WHY? Hollow inheritance is a compliance fraud to trick the linter into seeing contract adherence.
              FIX:
              1. Implement the specific methods promised by the Contract interface.
              2. Rename or delete the class if it is not meant to be a true contract implementation.
          - pattern: "*Marker*"
            message: >
              AES016 MARKER_BYPASS: Class '{name}' is a marker interface with no content.
              WHY? Marker classes must have at least one attribute or method to be meaningful in this architecture.
              FIX:
              1. Add semantic attributes or abstract methods to the marker class.
              2. Delete the marker if it serves no active architectural purpose.
          - pattern: "*Stub*"
            message: >
              AES016 STUB_BYPASS: Stub class '{name}' inheriting from {bases} provides no implementation.
              WHY? Stubs are temporary placeholders that bypass architectural enforcement logic.
              FIX:
              1. Replace the stub class with active implementation code that fulfills the contract.
              2. Delete the stub if it is unused in the application lifecycle.
          - pattern: "*Compliance*"
            message: >
              AES016 COMPLIANCE_BYPASS: Class '{name}' attempts compliance via inheritance fraud.
              WHY? Empty classes designed solely for 'compliance' are architectural sabotage.
              FIX:
              1. Provide a true implementation that adheres to the contract requirements.
              2. Refactor the design to satisfy the layer boundary properly.
          - pattern: "*Dummy*"
            message: >
              AES016 DUMMY_BYPASS: Class '{name}' is a dummy placeholder with no logic.
              WHY? Dummy classes sabotage the contract system and provide zero architectural value.
              FIX:
              1. Implement genuine domain or technical behavior on this class.
              2. Delete the placeholder and use standard mock libraries for unit testing.
          - pattern: "*Fake*"
            message: >
              AES016 FAKE_BYPASS: Class '{name}' is a fake implementation.
              WHY? Inheriting from a contract without providing methods is a fraudulent bypass.
              FIX:
              1. Supply all necessary method overrides declared in the contract.
              2. Remove the class if it is a duplicate or fraudulent stub.
          - pattern: "*Placeholder*"
            message: >
              AES016 PLACEHOLDER_BYPASS: Class '{name}' is an empty placeholder.
              WHY? Placeholders are technical debt and must not be committed to the main codebase.
              FIX:
              1. Replace the placeholder class with actual working code immediately.
              2. Remove the file if the implementation is deferred.
          - pattern: "*Sentinel*"
            message: >
              AES016 SENTINEL_BYPASS: Class '{name}' is a sentinel marker with no behavior.
              WHY? Sentinels must have clear semantic definitions; empty ones are treated as bypasses.
              FIX:
              1. Define clear sentinel variables, constants, or behavior inside the class.
              2. Remove the class if standard None-checks or built-in markers can be used instead.
          - pattern: "*Shim*"
            message: >
              AES016 SHIM_BYPASS: Class '{name}' is a shim without implementation.
              WHY? Empty shims create gaps in the architecture and mask missing dependencies.
              FIX:
              1. Fill the shim with the required routing or adapter logic.
              2. Replace it with direct wiring if the adapter structure is unnecessary.
          - pattern: "*Bypass*"
            message: >
              AES016 BYPASS_BYPASS: Class '{name}' explicitly identifies as a bypass.
              WHY? Naming a class 'Bypass' while keeping it empty is an admission of architectural fraud.
              FIX:
              1. Delete the class immediately to prevent architectural circumvention.
              2. Implement the required contract properly and honestly.

      - name: "Unused Mandatory Imports"
        check_unused_mandatory_imports: true
        check_unused_mandatory_imports_violation_message: >
          AES015 UNUSED_MANDATORY_IMPORT: Mandatory symbols are imported but never used.
          WHY? Importing required layers without usage is an architectural bypass attempt to satisfy rules.
          FIX:
          1. Utilize the imported symbols directly in your class, method, or helper logic.
          2. Remove the mandatory dependency or import from this file if it is not required.

    internal:
      - name: "Root_Standards"
        scope: "root"
        mandatory_class_definition: false
        barrel_completeness: false
        suffix_violation_message: >
          AES011 SUFFIX_MISMATCH: Root file is missing the required '_entry' suffix.
          WHY? The root layer is reserved for system entry points (e.g., cli_main_entry.py).
          FIX:
          1. Rename the file to include the required `_entry` suffix (e.g., `cli_main_entry.py`).
          2. Ensure the file contains only global configuration, environment loading, or CLI execution boundaries.

      - name: "Taxonomy_Standards"
        scope: "taxonomy"
        barrel_completeness: true
        forbid_internal_all: true
        barrel_completeness_violation_message: >
          AES012 BARREL_COMPLETENESS: __init__.py is missing the __all__ export list.
          WHY? Taxonomy is the system foundation; all public symbols must be explicitly exported via barrels.
          FIX:
          1. Add a proper `__all__ = [...]` list to the layer's `__init__.py` file.
          2. Export only the public classes, value objects, entities, errors, or events that constitute the public API.
        forbid_internal_all_violation_message: >
          AES013 INTERNAL_ALL_FORBIDDEN: __all__ export list detected in a non-barrel file.
          WHY? Only the __init__.py barrel file should define the layer's public API surface.
          FIX:
          1. Remove `__all__` exports from this sub-module file.
          2. Declare and export these symbols exclusively through the parent layer's `__init__.py` file.
        suffix_violation_message: >
          AES011 SUFFIX_MISMATCH: Taxonomy file is missing a required role-based suffix.
          WHY? Suffixes (_vo, _entity, _error, _event) are required to communicate component roles.
          FIX:
          1. Rename the file to include a correct suffix matching its role (e.g., `user_data_vo.py`, `order_entity.py`).
          2. Verify that the class names inside also match the suffix role.

      - name: "Taxonomy_VO_Integrity"
        scope: "taxonomy(vo)"
        no_primitives: false

      - name: "Taxonomy_Entity_Integrity"
        scope: "taxonomy(entity)"
        no_primitives: true
        exceptions: ["__init__.py"]
        no_primitives_violation_message: >
          AES006 PRIMITIVE_USAGE: Raw primitive types detected in a domain entity.
          WHY? Entities must use Value Objects to encapsulate domain rules and preserve semantics.
          FIX:
          1. Identify all raw primitives (str, int, float) used in annotations.
          2. Replace them with proper Value Object (`_vo`) classes from the taxonomy layer.

      - name: "Taxonomy_Error_Integrity"
        scope: "taxonomy(error)"
        no_primitives: true
        no_primitives_violation_message: >
          AES006 PRIMITIVE_USAGE: Raw primitive types detected in a domain error.
          WHY? Domain errors must use Value Objects for consistent structure and metadata handling.
          FIX:
          1. Identify raw primitive fields used in annotations.
          2. Replace raw types or strings with structured Value Objects (`_vo`) like `ErrorMessage` or `ErrorCode`.

      - name: "Taxonomy_Event_Integrity"
        scope: "taxonomy(event)"
        no_primitives: true
        no_primitives_violation_message: >
          AES006 PRIMITIVE_USAGE: Raw primitive types detected in a domain event.
          WHY? Events represent state changes and must be composed of Value Objects to ensure domain integrity.
          FIX:
          1. Identify raw primitive types inside the event payload definition.
          2. Replace them with proper Value Object (`_vo`) classes representing the changed state.


      - name: "Contract_Standards"
        scope: "contract"
        no_primitives: true
        barrel_completeness: true
        forbid_internal_all: true
        barrel_completeness_violation_message: >
          AES012 BARREL_COMPLETENESS: __init__.py is missing the __all__ export list.
          WHY? Contracts define the public boundary and must explicitly export their interfaces.
          FIX:
          1. Add a proper `__all__ = [...]` list to the `__init__.py` inside the contract layer.
          2. Export only the public interfaces, ports, and protocol classes defining the boundary.
        forbid_internal_all_violation_message: >
          AES013 INTERNAL_ALL_FORBIDDEN: __all__ export list detected in a non-barrel file.
          WHY? Contract consumption must be centralized through the layer's barrel file.
          FIX:
          1. Remove the `__all__` list from this sub-module file.
          2. Move public interface exports exclusively into the contract layer's parent `__init__.py` file.
        suffix_violation_message: >
          AES008 CONTRACT_SUFFIX_MISMATCH: File is missing a required contract-specific suffix.
          WHY? Every contract must communicate its role as a port, protocol, or IO boundary via suffixes.
          FIX:
          1. Rename the file to include the correct contract-specific suffix (e.g., `_port.py`, `_protocol.py`, `_io.py`).
          2. Verify that the interface classes defined within also end with `Port`, `Protocol`, or `IO`.
        no_primitives_violation_message: >
          AES006 PRIMITIVE_USAGE: Raw primitive types detected in a contract interface.
          WHY? Contracts must use domain types to prevent technical implementation details from leaking.
          FIX:
          1. Replace all raw parameters, types, or return values (str, int, float) with explicit taxonomy VOs (`_vo` or `_entity`).
          2. Use generic abstract typing protocols or domain collections if truly necessary.

      - name: "Capabilities_Standards"
        scope: "capabilities"

        no_primitives: true
        barrel_completeness: true
        forbid_internal_all: true
        no_primitives_violation_message: >
          AES006 PRIMITIVE_USAGE: Raw primitive types detected in the capabilities layer.
          WHY? Capability classes implement use cases and must operate on typed Value Objects to preserve domain boundary integrity.
          FIX:
          1. Replace primitive type annotations (str, int, float) in public methods and class constructors with proper Value Objects in /src/taxonomy.
          2. For internal helper structures or local functions, prefix their names with a single underscore (e.g., `_helper`) to make them private and exempt them from primitive checking, or annotate internal state with `Any`.
        barrel_completeness_violation_message: >
          AES012 BARREL_COMPLETENESS: __init__.py is missing the __all__ export list.
          WHY? Explicit exports ensure a clean and predictable API surface for the agent layer.
          FIX:
          1. Add a proper `__all__ = [...]` export list to the capability layer's `__init__.py`.
          2. Expose only the primary use case orchestrators, analyzers, or executors.
        forbid_internal_all_violation_message: >
          AES013 INTERNAL_ALL_FORBIDDEN: __all__ export list detected in a non-barrel file.
          WHY? Use case implementations must be exported exclusively through the layer's barrel file.
          FIX:
          1. Remove `__all__` exports from this capability file.
          2. Centralize capability exports in the layer's primary `__init__.py` file.
        suffix_violation_message: >
          AES011 SUFFIX_MISMATCH: Capability file uses an incorrect or forbidden suffix.
          WHY? Capability suffixes must reflect specific use-case roles like _analyzer or _executor.
          FIX:
          1. Rename the file to use an allowed capability suffix matching its design role (e.g., `_analyzer.py`, `_executor.py`, `_processor.py`).
          2. Ensure the class names inside also match this specialized suffix.

      - name: "Infrastructure_Standards"
        scope: "infrastructure"

        no_primitives: false
        barrel_completeness: true
        forbid_internal_all: true
        barrel_completeness_violation_message: >
          AES012 BARREL_COMPLETENESS: __init__.py is missing the __all__ export list.
          WHY? Centralized exports in __init__.py allow the agent to discover adapters consistently.
          FIX:
          1. Add a proper `__all__ = [...]` export list to the infrastructure layer's `__init__.py`.
          2. Expose only public adapters, providers, repositories, or watcher classes.
        forbid_internal_all_violation_message: >
          AES013 INTERNAL_ALL_FORBIDDEN: __all__ export list detected in a non-barrel file.
          WHY? Technical implementation details should not define their own public API surface.
          FIX:
          1. Remove the `__all__` list from this sub-module file.
          2. Move public class exports exclusively into the parent infrastructure `__init__.py` file.
        suffix_violation_message: >
          AES011 SUFFIX_MISMATCH: Infrastructure file uses a reserved domain or contract suffix.
          WHY? Infrastructure is for technical implementations; domain concepts are strictly forbidden here.
          FIX:
          1. Rename the file to use a technical suffix (e.g., `_adapter.py`, `_client.py`, `_repository.py`).
          2. Remove any taxonomy domain-specific role naming suffixes (`_vo`, `_entity`, `_error`, `_event`).

      - name: "Surfaces_Standards"
        scope: "surfaces"
        no_primitives: false
        barrel_completeness: true
        forbid_internal_all: true
        exceptions: ["__init__.py", "cli_config_templates.py"]
        barrel_completeness_violation_message: >
          AES012 BARREL_COMPLETENESS: __init__.py is missing the __all__ export list.
          WHY? Surfaces are entry points; all public commands and presenters must be explicitly exported.
          FIX:
          1. Add a proper `__all__ = [...]` export list to the surfaces layer's `__init__.py` file.
          2. Expose all public page, command, handler, or controller classes.
        forbid_internal_all_violation_message: >
          AES013 INTERNAL_ALL_FORBIDDEN: __all__ export list detected in a non-barrel file.
          WHY? Surface submodules must export via the barrel to maintain a clean boundary.
          FIX:
          1. Remove `__all__` exports from this surfaces sub-module file.
          2. Centralize public surface command or presenter classes in the surfaces parent `__init__.py`.
        suffix_violation_message: >
          AES011 SUFFIX_MISMATCH: Surface file uses a forbidden suffix or domain type.
          WHY? Surfaces must not define domain concepts; those belong exclusively in the taxonomy layer.
          FIX:
          1. Rename the file to use surface-specific suffixes like `_command.py`, `_page.py`, or `_handler.py`.
          2. Do not define core domain concepts or data structures in this layer.

      - name: "Agent_Standards"
        scope: "agent"
        no_primitives: false
        barrel_completeness: true
        forbid_internal_all: true
        exceptions: ["__init__.py"]
        barrel_completeness_violation_message: >
          AES012 BARREL_COMPLETENESS: __init__.py is missing the __all__ export list.
          WHY? The agent is the system's brain; its public API must be explicitly exported to surfaces.
          FIX:
          1. Add a proper `__all__ = [...]` export list to the agent layer's `__init__.py` file.
          2. Expose public orchestrators, managers, coordinators, or containers.
        forbid_internal_all_violation_message: >
          AES013 INTERNAL_ALL_FORBIDDEN: __all__ export list detected in a non-barrel file.
          WHY? Agent internal submodules must centralize their exports in the layer's barrel file.
          FIX:
          1. Remove the `__all__` export list from this agent sub-module.
          2. Manage public agent interface exports exclusively through the parent agent layer's `__init__.py` barrel.
        suffix_violation_message: >
          AES011 SUFFIX_MISMATCH: Agent file uses a forbidden or non-specialized role suffix.
          WHY? We enforce strict role specialization (container, manager, orchestrator, registry, coordinator).
          FIX:
          1. Rename the file to end with one of the five specialized suffixes (e.g., `_container.py`, `_orchestrator.py`, `_manager.py`).
          2. Refactor class structures inside to map directly to these five structural specialized roles.


      - name: "Agent_Container_Wiring_Mandate"
        scope: "agent(container)"
        no_domain_logic: true
        must_implement_service_container_io: true
        lazy_eager_initialization_only: true
        no_domain_logic_violation_message: >
          AES021 AGENT_ROLE_VIOLATION: Domain logic detected in the structural Container.
          WHY? The Container acts as an 'Electrician' and must only handle structural wiring and DI.
          FIX:
          1. Extract all business, execution, or domain decision logic from the Container.
          2. Relocate this logic to an Orchestrator, Coordinator, or specialized use case Capability.
        must_implement_service_container_io_violation_message: >
          AES021 AGENT_ROLE_VIOLATION: Container does not implement the ServiceContainerIO interface.
          WHY? All structural containers must adhere to the standard Dependency Injection interface.
          FIX:
          1. Declare inheritance from the standard ServiceContainerIO abstract contract inside the class definition.
          2. Implement the required abstract methods for dependency lookup and registration.
        lazy_eager_initialization_only_violation_message: >
          AES021 AGENT_ROLE_VIOLATION: Complex logic found in the Container initialization process.
          WHY? Containers should only handle lazy or eager wiring setup without performing IO.
          FIX:
          1. Remove complex conditional routing, file-system access, or network IO from the class initialization.
          2. Delegate complex instantiation or system health validation to a Manager or Orchestrator.

      - name: "Agent_Orchestrator_Stateless_Mandate"
        scope: "agent(orchestrator)"
        stateless_execution: true
        single_execution_goal: true
        forbid_any_type: true
        stateless_execution_violation_message: >
          AES021 AGENT_ROLE_VIOLATION: Non-stateless behavior detected in an Orchestrator.
          WHY? Orchestrators are 'Conductors' and must not hold internal execution state between calls.
          FIX:
          1. Remove any class instance variables (e.g., `self.state_cache`) that store transaction-specific state between runs.
          2. Store runtime execution state in external databases, registries, or pass them explicitly as parameters.
        single_execution_goal_violation_message: >
          AES021 AGENT_ROLE_VIOLATION: Multiple distinct domain goals detected in an Orchestrator.
          WHY? Orchestrators must focus on a single execution objective to ensure maintainability.
          FIX:
          1. Identify separate business goals or control flow branches implemented in the orchestrator class.
          2. Split the class into multiple specialized Orchestrators, each dedicated to a single flow.
        forbid_any_type_violation_message: >
          AES024 AGENT_ANY_BYPASS: `Any` type detected in the agent orchestrator logic.
          WHY? Using `Any` bypasses type safety for DI containers, masking method name or argument mismatches.
          FIX:
          1. Replace `Any` parameter or variable type hints with a typed contract Protocol or class.
          2. Establish strict interface contracts for Dependency Injection lookup instead of generic types.

      - name: "Agent_Coordinator_Strategic_Mandate"
        scope: "agent(coordinator)"
        high_level_policy_only: true
        coordinates_multiple_orchestrators: false
        high_level_policy_only_violation_message: >
          AES021 AGENT_ROLE_VIOLATION: Low-level implementation details found in a Coordinator.
          WHY? Coordinators must only handle high-level cross-domain policy decisions and orchestration.
          FIX:
          1. Abstract low-level operations, utility details, or service calls behind interface contracts.
          2. Delegate implementation details to specialized Orchestrators, leaving only coordination policies in this class.
        coordinates_multiple_orchestrators_violation_message: >
          AES021 AGENT_ROLE_VIOLATION: Coordinator is not performing cross-orchestrator coordination.
          WHY? Coordinators exist solely to manage the interaction between multiple distinct orchestrators.
          FIX:
          1. Ensure the class orchestrates the execution flow across at least two distinct Orchestrator classes.
          2. Remove the Coordinator layer if there is only a single orchestrator workflow (instantiate it directly).

      - name: "Agent_Registry_Inventory_Mandate"
        scope: "agent(registry)"
        crud_only: true
        no_decision_logic: true
        thread_async_safe: true
        crud_only_violation_message: >
          AES021 AGENT_ROLE_VIOLATION: Business or decision logic detected in a Registry.
          WHY? Registries are 'Librarians' meant strictly for inventory management and lookups.
          FIX:
          1. Relocate all complex domain logic, data transformation, or orchestration logic to an Orchestrator.
          2. Keep only simple create, read, update, or delete operations in the Registry.
        no_decision_logic_violation_message: >
          AES021 AGENT_ROLE_VIOLATION: Decision-making code found in a data Registry.
          WHY? Registries must be 'dumb' storage units without complex conditional or branching logic.
          FIX:
          1. Move conditional branching, validation checks, or decision gates out of this class.
          2. Shift decision-making code to the calling Agent Container or Orchestrator.
        thread_async_safe_violation_message: >
          AES021 AGENT_ROLE_VIOLATION: Non-thread-safe or non-async-safe operations in a Registry.
          WHY? Registries are shared resources and must handle concurrent access safely across threads.
          FIX:
          1. Implement thread locks, asyncio semaphores, or atomic operations around mutable state fields.
          2. Leverage immutable data patterns to prevent data corruption under concurrent lookups.

      - name: "Agent_Manager_Lifecycle_Mandate"
        scope: "agent(manager)"
        no_domain_data_storage: true
        owns_system_health_transitions: true
        lifecycle_tracking_only: true
        no_domain_data_storage_violation_message: >
          AES021 AGENT_ROLE_VIOLATION: Domain data storage detected in a lifecycle Manager.
          WHY? Managers are 'Supervisors' of system health and lifecycle, not domain data containers.
          FIX:
          1. Move domain data structures, caching, or transaction variables out of this class.
          2. Relocate domain-specific storage to a Registry or standard database repository.
        owns_system_health_transitions_violation_message: >
          AES021 AGENT_ROLE_VIOLATION: Manager is ignoring system lifecycle or health states.
          WHY? Managers must actively track and manage system health transitions and component lifecycles.
          FIX:
          1. Implement state transitions and health validation properties representing system state.
          2. Ensure the Manager is hooked into the lifecycle startup, shutdown, and health transitions of components.
        lifecycle_tracking_only_violation_message: >
          AES021 AGENT_ROLE_VIOLATION: Manager is performing operational domain-specific tasks.
          WHY? Managers should only supervise lifecycles, not execute business or operational workflows.
          FIX:
          1. Abstract operational use cases and delegate them to orchestrator or capability flows.
          2. Restrict the manager's functionality exclusively to component supervisor status checks and transitions.

    external:
      - name: "Taxonomy_Relations"
        scope: "taxonomy"
        check_orphan: true
        exceptions: ["__init__.py", "rust_taxonomy_bridge.py", "js_taxonomy_bridge.py"]
        orphan_violation_message: >
          AES017 ORPHAN_CODE_DETECTION: Taxonomy component is unreachable and unused.
          WHY? Taxonomy must be consumed by Contract, Infra, Capability, or Surface to be alive.
          FIX:
          1. Register the component in the taxonomy layer's `__init__.py` file.
          2. Import and consume the taxonomy component in at least one active consumer layer (Contract, Infra, Capability, or Surface).

      - name: "Taxonomy_Vo_Relations"
        scope: "taxonomy(vo)"
        allowed_import: ["taxonomy"]
        mandatory_import: null
        exceptions: ["__init__.py"]
        forbidden_import:
          ["taxonomy(entity,error,event)", "agent", "infrastructure", "surfaces", "contract", "capabilities", "root"]
        forbidden_import_violation_message: >
          AES001 IMPORT_LAYER_VIOLATION: Taxonomy VO imported from an outer layer.
          WHY? Taxonomy is the system's foundation and must have zero dependencies on outer layers.
          FIX:
          1. Remove any import referencing agent, infrastructure, surfaces, contract, capabilities, or root.
          2. Refactor the VO so that it relies purely on local taxonomy VO types or standard primitives.

      - name: "Taxonomy_Entity_Error_Event_Relations"
        scope: "taxonomy(entity, error, event)"
        allowed_import: ["taxonomy"]
        mandatory_import: ["taxonomy(vo)"]
        exceptions: ["__init__.py"]
        forbidden_import: ["agent", "infrastructure", "surfaces", "contract", "capabilities", "root"]
        mandatory_import_violation_message: >
          AES002 MANDATORY_IMPORT_MISSING: Entity, Error, or Event missing VO import.
          WHY? Core domain structures must be composed of Value Objects to ensure domain integrity.
          FIX:
          1. Import the required Value Object (`_vo`) classes from the taxonomy layer.
          2. Define event, error, or entity attributes using these Value Object classes instead of raw primitive types.
        forbidden_import_violation_message: >
          AES001 IMPORT_LAYER_VIOLATION: Taxonomy imported from an outer layer.
          WHY? Taxonomy is the bottom-most layer and must not depend on outer system layers.
          FIX:
          1. Remove any imports referencing agent, infrastructure, contract, capabilities, or surfaces layers.
          2. Restrict all dependencies to local taxonomy VO sub-modules.

      - name: "Contract_Relations"
        scope: "contract"
        check_orphan: true
        orphan_violation_message: >
          AES017 ORPHAN_CODE_DETECTION: Contract has no heirs.
          WHY? A contract without an implementation in Infrastructure, Capabilities, or Agent is dead code.
          FIX:
          1. Implement this contract in a corresponding capability or infrastructure adapter class.
          2. Register the implementation in the Agent Container, or remove the contract if it is obsolete.
        exceptions: ["__init__.py"]

      - name: "Contract_Port_Protocol_Relations"
        scope: "contract(port, protocol)"
        allowed_import: ["taxonomy"]
        mandatory_import: ["taxonomy"]
        exceptions: ["__init__.py"]
        forbidden_import: ["agent", "infrastructure", "surfaces", "capabilities", "contract(io)", "root"]
        forbidden_import_violation_message: >
          AES001 IMPORT_LAYER_VIOLATION: Pure contract (_port/_protocol) depends on execution logic.
          WHY? Ports and Protocols define logic shapes and must not know about orchestration or implementation.
          FIX:
          1. Remove all imports from capabilities, infrastructure, surfaces, or agent layers.
          2. Remove references or imports to `_io` contract modules to preserve abstraction boundaries.

      - name: "Contract_IO_Relations"
        scope: "contract(io)"
        allowed_import: ["taxonomy", "contract"]
        mandatory_import: ["taxonomy", "contract(port|protocol|io)"]
        forbidden_inheritance: ["contract(port|protocol)"]
        exceptions: ["__init__.py"]
        forbidden_import: ["agent", "infrastructure", "surfaces", "capabilities", "root"]
        forbidden_import_violation_message: >
          AES001 IMPORT_LAYER_VIOLATION: Contract IO depends on implementation layers.
          WHY? IO represents the system's formal promise and must remain agnostic to implementation details.
          FIX:
          1. Remove all imports originating from the infrastructure, capabilities, agent, or surfaces layers.
          2. Restrict contract definitions to domain taxonomy structures and child contracts.
        forbidden_inheritance_violation_message: >
          AES026 INHERITANCE_VIOLATION: Contract IO must NOT inherit from Port or Protocol.
          WHY? IO is an aggregate contract (composition). Inheriting from Port/Protocol violates the aggregate's role as a facade.
          FIX:
          1. Change inheritance to aggregation by removing the base Port or Protocol class.
          2. Define Port or Protocol classes as fields or abstract methods inside the IO class.

      - name: "Capabilities_Relations"
        scope: "capabilities"
        check_orphan: false
        allowed_import: ["taxonomy", "contract"]
        mandatory_import: ["taxonomy", "contract(protocol)"]
        exceptions: ["__init__.py", "dispatch_parser_types.py", "mcp_tool_schema_checker.py", "mandatory_inheritance_checker.py", "mcp_command_handler.py", "mcp_desktop_client_handler.py", "mcp_execute_command.py", "mcp_health_handler.py", "mcp_job_handler.py", "mcp_server_handler.py", "mcp_tools_store.py", "surface_hierarchy_checker.py"]
        forbidden_import: ["infrastructure", "surfaces", "agent", "capabilities", "root"]
        orphan_violation_message: >
          AES017 ORPHAN_CODE_DETECTION: Capability is not wired or executed.
          WHY? To be alive, a capability must be registered in the Agent Container AND invoked by an Orchestrator.
          FIX:
          1. Register this capability in the Agent capability mixin container.
          2. Ensure it is imported and actively invoked during an Orchestrator workflow.
        mandatory_import_violation_message: >
          AES002 MANDATORY_IMPORT_MISSING: Capability missing taxonomy or contract protocol.
          WHY? Capabilities implement use cases and require domain types and interface protocols.
          FIX:
          1. Import the corresponding `_protocol` contract class definition.
          2. Declare inheritance from the imported protocol class directly in your capability definition.
        forbidden_import_violation_message: >
          AES001 IMPORT_LAYER_VIOLATION: Capability imported from an unauthorized layer or sibling module.
          WHY? Capabilities must be independent; importing siblings or outer layers causes circular cycles.
          FIX:
          1. Remove any imports from other capability modules, infrastructure, surfaces, or agent layers.
          2. Inject required capability or technical dependencies via the ServiceContainerIO.
      - name: "Infrastructure_Relations"
        scope: "infrastructure"
        check_orphan: false
        mandatory_import: ["taxonomy", "contract(port)"]
        exceptions: ["__init__.py", "mcp_server_constants.py", "mcp_server_schemas.py", "mcp_server_resources.py", "mcp_server_lifespan.py", "mcp_server_validator.py", "python_ast_utils.py", "python_primitive_checker.py", "python_symbol_collector.py"]
        forbidden_import: ["surfaces", "capabilities", "agent", "infrastructure", "root"]
        allowed_import: ["taxonomy", "contract"]
        orphan_violation_message: >
          AES017 ORPHAN_CODE_DETECTION: Infrastructure adapter is not wired or executed.
          WHY? To be alive, infrastructure must be registered in the Agent Container AND invoked via a port.
          FIX:
          1. Register this infrastructure class in the Agent infrastructure mixin container.
          2. Ensure it implements and overrides the required Port interface contract.
        mandatory_import_violation_message: >
          AES002 MANDATORY_IMPORT_MISSING: Infrastructure missing taxonomy or port import.
          WHY? Infrastructure provides technical services and must implement a port from the contract layer.
          FIX:
          1. Import the correct `_port` abstract class definition from the contract layer.
          2. Inherit from this port class directly in your infrastructure adapter definition.
        forbidden_import_violation_message: >
          AES001 IMPORT_LAYER_VIOLATION: Infrastructure component imported from an unauthorized layer or sibling.
          WHY? Infrastructure adapters must be isolated; importing siblings creates technical coupling and cycles.
          FIX:
          1. Remove imports referencing other infrastructure modules, surfaces, capabilities, or agent layers.
          2. Access shared utility configurations or data objects strictly through standard taxonomy or Dependency Injection.

      - name: "Root_Relations"
        scope: "root"
        allowed_import: ["agent", "taxonomy", "contract", "infrastructure", "capabilities", "surfaces"]

      - name: "Agent_Governance_Relations"
        scope: "agent(container|registry|mixin)"
        check_orphan: true
        allowed_import: [
          "agent(orchestrator|coordinator|dispatcher)",
          "agent(manager|handler|result|state)",
          "agent(mixin)",
          "taxonomy", 
          "contract", 
          "infrastructure", 
          "capabilities"
        ]
        mandatory_import: ["taxonomy", "contract"]
        exceptions: ["__init__.py"]
        forbidden_import: ["surfaces", "root"]
        orphan_violation_message: >
          AES017 ORPHAN_CODE_DETECTION: Agent Governance component is unreachable.
          WHY? The wiring layer must be accessible from the surface entry points.
          FIX:
          1. Ensure the Container or Registry class is imported inside the Surface entry modules (e.g., CLI, HTTP).
          2. Expose the component registration public methods in the agent's parent `__init__.py` file.

      - name: "Agent_Orchestration_Relations"
        scope: "agent(orchestrator|coordinator|dispatcher)"
        check_orphan: true
        allowed_import: ["taxonomy", "contract"]
        mandatory_import: ["taxonomy", "contract(io)"]
        exceptions: ["__init__.py"]
        forbidden_import: [
          "surfaces", 
          "agent(orchestrator|coordinator|dispatcher|manager|handler|result|state)",
          "agent(container|registry|mixin)",
          "root"
        ]
        forbidden_import_violation_message: >
          AES001 IMPORT_LAYER_VIOLATION: Orchestrator depends on a sibling or governance component.
          WHY? Orchestrators must only use ServiceContainerIO (contract) to avoid circular dependencies with the implementation.
          FIX:
          1. Replace direct imports of Container, Registry, or other Orchestration siblings with abstract DI interfaces.
          2. Access capability tools and infrastructure providers strictly via `self.container.get(ContractIO)`.

      - name: "Agent_Support_Relations"
        scope: "agent(manager|handler|result|state)"
        allowed_import: ["taxonomy", "contract(io)"]
        mandatory_import: ["taxonomy"]
        exceptions: ["__init__.py"]
        forbidden_import: ["agent", "infrastructure", "capabilities", "surfaces", "root"]
        forbidden_import_violation_message: >
          AES001 IMPORT_LAYER_VIOLATION: Support module (leaf node) depends on orchestration or outer layers.
          WHY? Manager/Result must be independent of the wiring and logic flow to prevent cycles.
          FIX:
          1. Remove any imports linking to Agent Orchestrators, Infrastructure, or Capability modules.
          2. Stick purely to basic domain Taxonomy VOs and Contract IO structures to pass results.

      - name: "Smart_Surface_Relations"
        scope: "surfaces(page|command|handler|controller)"
        allowed_import: ["agent", "taxonomy", "contract(io)", "surfaces"]
        mandatory_import: ["agent", "taxonomy", "contract(io)"]
        exceptions: ["__init__.py"]
        forbidden_import: ["infrastructure", "capabilities", "contract(port)", "contract(protocol)", "root"]
        mandatory_import_violation_message: >
          AES002 MANDATORY_IMPORT_MISSING: Smart Surface missing required layers (Agent/Taxonomy/Contract IO).
          WHY? Smart surfaces are entry points that orchestrate the system via the Agent layer using standard VO and IO contracts.
          FIX:
          1. Import the required Agent orchestrator, Taxonomy Value Objects, and Contract IO wrappers.
          2. Drive the system flow exclusively through these imported abstractions.

      - name: "Utility_Surface_Relations"
        scope: "surfaces(hook|store|provider|router|)"
        allowed_import: ["agent", "taxonomy", "contract(io)", "surfaces(passive)"]
        forbidden_import: [
          "infrastructure", 
          "capabilities", 
          "contract(port)", 
          "contract(protocol)",
          "surfaces(page|command|handler|controller|entry)",
          "root"
        ]
        forbidden_import_violation_message: >
          AES018 SURFACE_HIERARCHY_VIOLATION: Utility surface cannot depend on a Smart surface.
          WHY? Smart surfaces are entry points that orchestrate flow; utility surfaces are helpers that should be stateless or leaf-oriented.
          FIX:
          1. Remove any dependency, reference, or import linking to Smart Surfaces (e.g., Controllers, Pages).
          2. Restructure shared utility state to reside inside Agent, Contract IO, or Taxonomy layers.

      - name: "Passive_Surface_Relations"
        scope: "surfaces(component|layout|view)"
        allowed_import: ["taxonomy"]
        mandatory_import: ["taxonomy"]
        exceptions: ["__init__.py"]
        forbidden_import: [
          "agent", 
          "contract", 
          "infrastructure", 
          "capabilities", 
          "surfaces(page|command|handler|controller|entry|hook|store|provider|router)",
          "root"
        ]
        forbidden_import_violation_message: >
          AES019 PASSIVE_SURFACE_VIOLATION: Passive surface (Dumb) must only import Taxonomy.
          WHY? Components and views should only know about data structures (Taxonomy), not logic or orchestration.
          FIX:
          1. Remove all imports referencing Agent, Contract, Infrastructure, Capability, or Active Surface modules.
          2. Pass all necessary callback methods, events, and data parameters purely via props or arguments from the parent Smart Surface.
