thresholds:
  score: 100.0
  complexity: 15

output_dir: "output"

adapters:
  - name: "ruff"
    weight: 1.0
  - name: "mypy"
    weight: 1.0
  - name: "bandit"
    weight: 1.0
  - name: "architecture"
    weight: 3.0

ignored_rules: []

ignored_paths:
  - "./output"
  - "/.git"
  - "/.github"
  - "/scratch"
  - "/packages"
  - "/__pycache__"
  - "/node_modules"
  - "/.venv"
  - "/venv"
  - "/.mypy_cache"
  - "/.ruff_cache"
  - "/test-workspaces"
  - "/tests"

architecture:
  enabled: true
  rules:
    AES101:
      enabled: true
      scope:
        [
          "taxonomy",
          "contract",
          "capabilities",
          "infrastructure",
          "agent",
          "surface",
          "root",
        ]
      exceptions: ["__init__.py", "__main__.py", "main.py"]

    AES102:
      enabled: true
      scope:
        [
          "taxonomy",
          "contract",
          "capabilities",
          "infrastructure",
          "agent",
          "surface",
          "root",
        ]
      exceptions: ["__init__.py", "main.py", "lib.py"]
      layers:
        taxonomy:
          suffix:
            - strict:
                [
                  "vo",
                  "entity",
                  "error",
                  "event",
                  "constant",
                  "utility",
                  "helper",
                ]
        contract:
          suffix:
            - strict: ["protocol", "aggregate"]
        capabilities:
          suffix:
            - flexible:
                [
                  "analyzer",
                  "checker",
                  "processor",
                  "evaluator",
                  "resolver",
                  "validator",
                  "formatter",
                  "executor",
                  "transformer",
                  "calculator",
                  "builder",
                  "compiler",
                  "aggregator",
                  "classifier",
                  "extractor",
                  "reporter",
                  "mapper",
                  "filter",
                  "collector",
                  "comparator",
                  "scorer",
                  "inspector",
                  "reviewer",
                  "assessor",
                  "auditor",
                  "actions",
                ]
            - forbidden:
                [
                  "vo",
                  "entity",
                  "error",
                  "event",
                  "constant",
                  "constants",
                  "utility",
                  "helper",
                  "port",
                  "protocol",
                  "aggregate",
                ]
        infrastructure:
          suffix:
            - flexible:
                [
                  "adapter",
                  "provider",
                  "scanner",
                  "client",
                  "schemas",
                  "lifespan",
                  "wrapper",
                  "tracer",
                  "tracker",
                  "variants",
                  "detector",
                  "patterns",
                  "system",
                  "repository",
                  "cache",
                  "loader",
                  "writer",
                  "reader",
                  "driver",
                  "connector",
                  "gateway",
                  "serializer",
                  "encoder",
                  "decoder",
                  "fetcher",
                  "watcher",
                  "indexer",
                  "dispatcher",
                  "recorder",
                  "proxy",
                  "publisher",
                  "subscriber",
                  "listener",
                  "poller",
                  "streamer",
                ]
            - forbidden:
                [
                  "vo",
                  "entity",
                  "error",
                  "event",
                  "constant",
                  "constants",
                  "utility",
                  "helper",
                  "port",
                  "protocol",
                  "aggregate",
                ]
        agent:
          suffix:
            - strict: ["orchestrator"]
        surface:
          suffix:
            - strict:
                [
                  "command",
                  "controller",
                  "page",
                  "view",
                  "component",
                  "router",
                  "layout",
                  "hook",
                  "store",
                  "action",
                  "screen",
                ]
        root:
          suffix:
            - strict: ["entry", "container"]
    AES201:
      enabled: true
      scope:
        [
          "taxonomy",
          "contract",
          "capabilities",
          "infrastructure",
          "agent",
          "surface",
        ]
      exceptions: ["__init__.py", "__main__.py", "main.py"]
      conditions:
        - scope: "taxonomy(vo)"
          allowed: ["taxonomy"]
          mandatory: null
          forbidden:
            [
              "agent",
              "infrastructure",
              "surface",
              "contract",
              "capabilities",
              "root",
            ]

        - scope: "taxonomy(entity,error,event)"
          allowed: ["taxonomy"]
          mandatory: ["taxonomy(vo|constant)"]
          forbidden:
            [
              "agent",
              "infrastructure",
              "surface",
              "contract",
              "capabilities",
              "root",
            ]

        - scope: "taxonomy(constant)"
          allowed: ["taxonomy"]
          mandatory: null
          forbidden:
            [
              "agent",
              "infrastructure",
              "surface",
              "contract",
              "capabilities",
              "root",
            ]

        - scope: "contract(protocol)"
          allowed: ["taxonomy", "contract"]
          mandatory: ["taxonomy"]
          forbidden:
            [
              "agent",
              "infrastructure",
              "surface",
              "capabilities",
              "contract(aggregate)",
              "root",
            ]

        - scope: "contract(aggregate)"
          allowed: ["taxonomy", "contract"]
          mandatory: ["taxonomy"]
          forbidden:
            ["agent", "infrastructure", "surface", "capabilities", "root"]
          forbidden_inheritance: ["contract(protocol)"]

        - scope: "capabilities"
          allowed: ["taxonomy", "contract"]
          mandatory: ["taxonomy", "contract(protocol)"]
          forbidden:
            ["infrastructure", "surface", "agent", "capabilities", "root"]
          allowed_imports:
            - layer: "taxonomy"
              purpose: "implement"
            - layer: "contract(port)"
              purpose: "implement"
            - layer: "contract(protocol|aggregate)"
              purpose: "call"

        - scope: "infrastructure"
          allowed: ["taxonomy", "contract"]
          mandatory: ["taxonomy", "contract(port)"]
          forbidden:
            ["surface", "capabilities", "agent", "infrastructure", "root"]
          allowed_imports:
            - layer: "taxonomy"
              purpose: "implement"
            - layer: "contract(port)"
              purpose: "implement"
            - layer: "contract(protocol|aggregate)"
              purpose: "call"

        - scope: "agent(orchestrator)"
          allowed:
            [
              "taxonomy",
              "contract(aggregate)",
              "contract(port)",
              "contract(protocol)",
            ]
          mandatory: ["taxonomy", "contract(aggregate)"]
          forbidden: ["surface", "infrastructure", "capabilities", "root"]

        - scope: "surface(command|controller|page|)"
          allowed: ["taxonomy", "contract"]
          mandatory: null
          forbidden:
            [
              "agent",
              "infrastructure",
              "capabilities",
              "contract(port)",
              "contract(protocol)",
              "root",
            ]

        - scope: "surface(hook|store|action|screen|router)"
          allowed: ["taxonomy"]
          mandatory: null
          forbidden:
            [
              "agent",
              "infrastructure",
              "capabilities",
              "contract(port)",
              "contract(protocol)",
              "surface(command|controller|page|entry)",
              "root",
            ]

        - scope: "surface(component|view|layout)"
          allowed: ["taxonomy"]
          mandatory: null
          forbidden:
            [
              "agent",
              "contract",
              "infrastructure",
              "capabilities",
              "surface(command|controller|page|entry|hook|store|action|screen|router)",
              "root",
            ]

    AES202:
      enabled: true
      scope:
        [
          "taxonomy",
          "contract",
          "capabilities",
          "infrastructure",
          "agent",
          "surface",
        ]
      exceptions: ["__init__.py", "__main__.py", "main.py"]
      conditions:
        - scope: "capabilities"
          allowed: ["taxonomy", "contract"]
          mandatory: ["taxonomy", "contract(protocol)"]
          forbidden:
            ["infrastructure", "surface", "agent", "capabilities", "root"]
          allowed_imports:
            - layer: "taxonomy"
              purpose: "implement"
            - layer: "contract(port)"
              purpose: "implement"
            - layer: "contract(protocol|aggregate)"
              purpose: "call"

        - scope: "infrastructure"
          allowed: ["taxonomy", "contract"]
          mandatory: ["taxonomy", "contract(port)"]
          forbidden:
            ["surface", "capabilities", "agent", "infrastructure", "root"]
          allowed_imports:
            - layer: "taxonomy"
              purpose: "implement"
            - layer: "contract(port)"
              purpose: "implement"
            - layer: "contract(protocol|aggregate)"
              purpose: "call"

    AES205:
      enabled: true
      scope:
        [
          "taxonomy",
          "contract",
          "capabilities",
          "infrastructure",
          "agent",
          "surface",
        ]

    AES401:
      enabled: true
      scope:
        ["taxonomy(constant)", "taxonomy(entity,error,event)", "taxonomy(vo)"]

    AES402:
      enabled: true
      scope: ["contract(aggregate)", "contract(port|protocol)"]
      exceptions: ["__init__.py", "__main__.py", "main.py"]

    AES403:
      enabled: true
      scope: ["capabilities"]
      max_functions: 30
      max_impl: 5
      exceptions: ["__init__.py", "__main__.py", "main.py"]

    AES404:
      enabled: true
      scope: ["infrastructure"]
      exceptions: ["__init__.py", "__main__.py", "main.py"]

    AES405:
      enabled: true
      scope: ["agent(orchestrator)"]
      max_lines: 1000
      exceptions: ["__init__.py", "__main__.py", "main.py"]

    AES406:
      enabled: true
      scope:
        [
          "surface(command|controller|page|entry)",
          "surface(hook|store|action|screen|router)",
          "surface(component|view|layout)",
        ]
      max_functions: 15
      exceptions: ["__init__.py", "__main__.py", "main.py"]

    AES301:
      enabled: true
      scope:
        [
          "taxonomy",
          "contract",
          "capabilities",
          "infrastructure",
          "agent",
          "surface",
        ]
      max_lines: 1000
      exceptions: ["__init__.py", "__main__.py", "main.py"]

    AES302:
      enabled: true
      scope:
        [
          "taxonomy",
          "contract",
          "capabilities",
          "infrastructure",
          "agent",
          "surface",
        ]
      min_lines: 5
      exceptions: ["__init__.py", "__main__.py", "main.py"]

    AES304:
      enabled: true
      scope:
        [
          "taxonomy",
          "contract",
          "capabilities",
          "infrastructure",
          "agent",
          "surface",
        ]
      forbidden_bypass:
        [
          "# noqa",
          "# type: ignore",
          "# fmt: off",
          "# ruff: noqa",
          "# pylint: disable",
          "Any",
          "except:",
          "pass",
        ]
      exceptions: []

    AES305:
      enabled: true
      scope:
        [
          "taxonomy",
          "contract",
          "capabilities",
          "infrastructure",
          "agent",
          "surface",
        ]
      exceptions: []

    AES203:
      enabled: true
      scope:
        [
          "taxonomy",
          "contract",
          "capabilities",
          "infrastructure",
          "agent",
          "surface",
        ]

    AES204:
      enabled: true
      scope:
        [
          "taxonomy",
          "contract",
          "capabilities",
          "infrastructure",
          "agent",
          "surface",
        ]
      exceptions: []

    AES303:
      enabled: true
      scope:
        [
          "taxonomy",
          "contract",
          "capabilities",
          "infrastructure",
          "agent",
          "surface",
        ]
      exceptions: ["__init__.py", "__main__.py", "main.py"]

    AES501:
      enabled: true
      scope: ["taxonomy"]
      entry_points: []

    AES502:
      enabled: true
      scope: ["contract"]
      entry_points: []

    AES503:
      enabled: true
      scope: ["capabilities"]
      entry_points: []

    AES504:
      enabled: true
      scope: ["infrastructure"]
      entry_points: []

    AES505:
      enabled: true
      scope: ["agent"]
      entry_points: []

    AES506:
      enabled: true
      scope: ["surface"]
      entry_points: []
