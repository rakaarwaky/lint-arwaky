thresholds:
  score: 100.0
  complexity: 15

adapters:
  - name: "ruff"
    weight: 1.0
  - name: "mypy"
    weight: 1.0
  - name: "bandit"
    weight: 1.0
  - name: "architecture"
    weight: 3.0

ignored_rules: []

ignored_paths:
  - "/.mimocode"
  - "./output"
  - "/.git"
  - "/.github"
  - "/scratch"
  - "/packages"
  - "/__pycache__"
  - "/node_modules"
  - "/.venv"
  - "/venv"
  - "/.mypy_cache"
  - "/.ruff_cache"
  - "/tests"

architecture:
  enabled: true
  rules:
    AES101:
      enabled: true
      scope:
        [
          "taxonomy",
          "contract",
          "utility",
          "capabilities",
          "agent",
          "surfaces",
          "root",
        ]
      exceptions: ["__init__.py", "__main__.py", "main.py"]

    AES102:
      enabled: true
      scope:
        [
          "taxonomy",
          "contract",
          "utility",
          "capabilities",
          "agent",
          "surfaces",
          "root",
        ]
      exceptions: ["__init__.py", "main.py", "lib.py"]
      layers:
        taxonomy:
          suffix:
            - strict: ["vo", "entity", "error", "event", "constant"]
        contract:
          suffix:
            - strict: ["protocol", "aggregate"]
        utility:
          suffix:
            - flexible:
                [
                  "parser",
                  "splitter",
                  "trimmer",
                  "slugifier",
                  "sanitizer",
                  "normalizer",
                  "extractor",
                  "replacer",
                  "converter",
                  "counter",
                  "resolver",
                  "detector",
                  "builder",
                  "joiner",
                  "serializer",
                  "deserializer",
                  "encoder",
                  "decoder",
                  "hasher",
                  "generator",
                  "formatter",
                  "comparator",
                  "differ",
                  "matcher",
                  "checker",
                  "calculator",
                  "mapper",
                  "merger",
                  "grouper",
                  "sorter",
                  "deduplicator",
                  "printer",
                ]
            - forbidden:
                [
                  "vo",
                  "entity",
                  "error",
                  "event",
                  "constant",
                  "protocol",
                  "aggregate",
                ]
        capabilities:
          suffix:
            - flexible:
                [
                  "analyzer",
                  "checker",
                  "processor",
                  "evaluator",
                  "resolver",
                  "validator",
                  "formatter",
                  "executor",
                  "transformer",
                  "calculator",
                  "builder",
                  "compiler",
                  "aggregator",
                  "classifier",
                  "extractor",
                  "reporter",
                  "mapper",
                  "filter",
                  "collector",
                  "comparator",
                  "scorer",
                  "inspector",
                  "reviewer",
                  "assessor",
                  "auditor",
                  "actions",
                  "helper",
                ]
            - forbidden:
                [
                  "vo",
                  "entity",
                  "error",
                  "event",
                  "constant",
                  "constants",
                  "protocol",
                  "aggregate",
                  "utility",
                ]
        agent:
          suffix:
            - strict: ["orchestrator"]
        surfaces:
          suffix:
            - strict:
                [
                  "command",
                  "controller",
                  "page",
                  "view",
                  "component",
                  "router",
                  "layout",
                  "hook",
                  "store",
                  "action",
                  "screen",
                ]
        root:
          suffix:
            - strict: ["entry", "container"]

    AES201:
      enabled: true
      scope:
        ["taxonomy", "contract", "utility", "capabilities", "agent", "surfaces"]
      exceptions: ["__init__.py", "__main__.py", "main.py"]
      conditions:
        - scope: "taxonomy(vo)"
          allowed: ["taxonomy"]
          mandatory: null
          forbidden:
            ["agent", "surfaces", "contract", "utility", "capabilities", "root"]

        - scope: "taxonomy(entity,error,event)"
          allowed: ["taxonomy"]
          mandatory: ["taxonomy(vo|constant)"]
          forbidden:
            ["agent", "surfaces", "contract", "utility", "capabilities", "root"]

        - scope: "taxonomy(constant)"
          allowed: ["taxonomy"]
          mandatory: null
          forbidden:
            ["agent", "surfaces", "contract", "utility", "capabilities", "root"]

        - scope: "utility"
          allowed: ["taxonomy"]
          mandatory: null
          forbidden: ["agent", "surfaces", "contract", "capabilities", "root"]

        - scope: "contract(protocol)"
          allowed: ["taxonomy", "contract"]
          mandatory: ["taxonomy"]
          forbidden:
            ["agent", "surfaces", "capabilities", "contract(aggregate)", "root"]

        - scope: "contract(aggregate)"
          allowed: ["taxonomy", "contract"]
          mandatory: ["taxonomy"]
          forbidden: ["agent", "surfaces", "capabilities", "root"]
          forbidden_inheritance: ["contract(protocol)"]

        - scope: "capabilities"
          allowed: ["taxonomy", "contract", "utility"]
          mandatory: ["taxonomy", "contract(protocol)"]
          forbidden: ["surfaces", "agent", "capabilities", "root"]
          allowed_imports:
            - layer: "taxonomy"
              purpose: "implement"
            - layer: "contract(protocol)"
              purpose: "implement"
            - layer: "utility"
              purpose: "call"

        - scope: "agent(orchestrator)"
          allowed:
            ["taxonomy", "contract(aggregate)", "contract(protocol)", "utility"]
          mandatory: ["taxonomy", "contract(aggregate)"]
          forbidden: ["surfaces", "capabilities", "root"]

        - scope: "surfaces(command|controller|page)"
          allowed: ["taxonomy", "contract(aggregate)", "utility"]
          mandatory: null
          forbidden: ["agent", "capabilities", "contract(protocol)", "root"]
          allowed_imports:
            - layer: "taxonomy"
              purpose: "implement"
            - layer: "contract(aggregate)"
              purpose: "call"
            - layer: "utility"
              purpose: "call"

        - scope: "surfaces(hook|store|action|screen|router)"
          allowed: ["taxonomy"]
          mandatory: null
          forbidden:
            [
              "agent",
              "capabilities",
              "contract(protocol)",
              "surfaces(command|controller|page|entry)",
              "root",
            ]

        - scope: "surfaces(component|view|layout)"
          allowed: ["taxonomy"]
          mandatory: null
          forbidden:
            [
              "agent",
              "contract",
              "capabilities",
              "surfaces(command|controller|page|entry|hook|store|action|screen|router)",
              "root",
            ]

    AES202:
      enabled: true
      scope:
        ["taxonomy", "contract", "utility", "capabilities", "agent", "surfaces"]
      exceptions: ["__init__.py", "__main__.py", "main.py"]
      conditions:
        - scope: "capabilities"
          allowed: ["taxonomy", "contract", "utility"]
          mandatory: ["taxonomy", "contract(protocol)"]
          forbidden: ["surfaces", "agent", "capabilities", "root"]
          allowed_imports:
            - layer: "taxonomy"
              purpose: "implement"
            - layer: "contract(protocol)"
              purpose: "implement"
            - layer: "utility"
              purpose: "call"

    AES203:
      enabled: true
      scope:
        ["taxonomy", "contract", "utility", "capabilities", "agent", "surfaces"]

    AES204:
      enabled: true
      scope:
        ["taxonomy", "contract", "utility", "capabilities", "agent", "surfaces"]
      exceptions: []

    AES205:
      enabled: true
      scope:
        ["taxonomy", "contract", "utility", "capabilities", "agent", "surfaces"]

    AES301:
      enabled: true
      scope:
        ["taxonomy", "contract", "utility", "capabilities", "agent", "surfaces"]
      max_lines: 1000
      exceptions: ["__init__.py", "__main__.py", "main.py"]

    AES302:
      enabled: true
      scope:
        ["taxonomy", "contract", "utility", "capabilities", "agent", "surfaces"]
      min_lines: 5
      exceptions: ["__init__.py", "__main__.py", "main.py"]

    AES303:
      enabled: true
      scope:
        ["taxonomy", "contract", "utility", "capabilities", "agent", "surfaces"]
      exceptions: ["__init__.py", "__main__.py", "main.py"]

    AES304:
      enabled: true
      scope:
        ["taxonomy", "contract", "utility", "capabilities", "agent", "surfaces"]
      forbidden_bypass:
        [
          "# noqa",
          "# type: ignore",
          "# fmt: off",
          "# ruff: noqa",
          "# pylint: disable",
          "Any",
          "except:",
          "pass",
        ]
      exceptions: []

    AES305:
      enabled: true
      scope:
        ["taxonomy", "contract", "utility", "capabilities", "agent", "surfaces"]
      exceptions: []

    AES401:
      enabled: true
      scope:
        ["taxonomy(constant)", "taxonomy(entity,error,event)", "taxonomy(vo)"]

    AES402:
      enabled: true
      scope: ["contract(aggregate)", "contract(protocol)"]
      exceptions: ["__init__.py", "__main__.py", "main.py"]

    AES403:
      enabled: true
      scope: ["capabilities"]
      max_functions: 30
      max_impl: 5
      exceptions: ["__init__.py", "__main__.py", "main.py"]

    AES404:
      enabled: true
      scope: ["utility"]
      exceptions: ["__init__.py", "__main__.py", "main.py"]

    AES405:
      enabled: true
      scope: ["agent(orchestrator)"]
      max_lines: 1000
      exceptions: ["__init__.py", "__main__.py", "main.py"]

    AES406:
      enabled: true
      scope:
        [
          "surfaces(command|controller|page|entry)",
          "surfaces(hook|store|action|screen|router)",
          "surfaces(component|view|layout)",
        ]
      max_functions: 15
      exceptions: ["__init__.py", "__main__.py", "main.py"]

    AES501:
      enabled: true
      scope: ["taxonomy"]
      entry_points: []

    AES502:
      enabled: true
      scope: ["contract"]
      entry_points: []

    AES503:
      enabled: true
      scope: ["capabilities"]
      entry_points: []

    AES504:
      enabled: true
      scope: ["utility"]
      entry_points: []

    AES505:
      enabled: true
      scope: ["agent"]
      entry_points: []

    AES506:
      enabled: true
      scope: ["surfaces"]
      entry_points: []
