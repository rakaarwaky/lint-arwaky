<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lint Arwaky Graph Debugger (Web Mode)</title>
    <!-- Outfit & Plus Jakarta Sans Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Load local Cytoscape.js copy -->
    <script src="crates/vscode-extension/frontend/media/cytoscape.min.js"></script>

    <style>
      :root {
        --bg-color: #0d1117;
        --sidebar-bg: rgba(22, 27, 34, 0.85);
        --panel-border: rgba(240, 246, 252, 0.1);
        --accent-color: #58a6ff;
        --accent-glow: rgba(88, 166, 255, 0.4);

        --color-file: #1f6feb;
        --color-class: #34d399;
        --color-function: #ff7b72;
        --color-interface: #a78bfa;
        --color-trait: #fb923c;

        --font-main: "Plus Jakarta Sans", system-ui, sans-serif;
        --font-display: "Outfit", sans-serif;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: var(--font-main);
        background-color: var(--bg-color);
        color: #c9d1d9;
        height: 100vh;
        overflow: hidden;
        display: flex;
      }

      /* Sidebar Controls */
      .sidebar {
        width: 320px;
        height: 100vh;
        background: var(--sidebar-bg);
        border-right: 1px solid var(--panel-border);
        padding: 24px;
        display: flex;
        flex-direction: column;
        gap: 20px;
        z-index: 10;
        overflow-y: auto;
      }

      .logo-section {
        display: flex;
        align-items: center;
        gap: 12px;
        padding-bottom: 16px;
        border-bottom: 1px solid var(--panel-border);
      }

      .logo-icon {
        width: 32px;
        height: 32px;
        background: linear-gradient(135deg, #1f6feb, #d2a8ff);
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: var(--font-display);
        font-weight: 700;
        color: #fff;
        box-shadow: 0 0 12px var(--accent-glow);
      }

      .logo-title {
        font-family: var(--font-display);
        font-weight: 700;
        font-size: 1.15rem;
        background: linear-gradient(135deg, #fff, #8b949e);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      /* Loader Card */
      .loader-card {
        background: rgba(88, 166, 255, 0.08);
        border: 1px solid var(--accent-color);
        border-radius: 12px;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .loader-title {
        font-family: var(--font-display);
        font-weight: 600;
        font-size: 0.95rem;
        color: var(--accent-color);
      }

      .file-input-wrapper {
        position: relative;
        overflow: hidden;
        display: inline-block;
      }

      .file-input {
        width: 100%;
        background: rgba(0, 0, 0, 0.3);
        border: 1px dashed var(--panel-border);
        border-radius: 8px;
        padding: 12px;
        color: #8b949e;
        font-family: var(--font-main);
        font-size: 0.8rem;
        cursor: pointer;
        text-align: center;
        transition: all 0.2s;
      }

      .file-input:hover {
        border-color: var(--accent-color);
        color: #fff;
      }

      /* Control Cards */
      .control-card {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 12px;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .card-title {
        font-family: var(--font-display);
        font-weight: 600;
        font-size: 0.9rem;
        color: #f0f6fc;
      }

      .search-input {
        width: 100%;
        background: rgba(0, 0, 0, 0.3);
        border: 1px solid var(--panel-border);
        border-radius: 8px;
        padding: 10px;
        color: #fff;
        font-family: var(--font-main);
        font-size: 0.85rem;
      }

      .filter-item {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 0.85rem;
        cursor: pointer;
      }

      .filter-checkbox {
        width: 16px;
        height: 16px;
        cursor: pointer;
      }

      .color-indicator {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        display: inline-block;
      }

      .btn-group {
        display: flex;
        gap: 8px;
      }

      .btn {
        flex: 1;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: #c9d1d9;
        padding: 8px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 0.8rem;
        font-weight: 500;
        transition: all 0.2s;
      }

      .btn:hover {
        background: var(--accent-color);
        color: #0d1117;
        border-color: var(--accent-color);
      }

      /* Canvas */
      #cy {
        flex: 1;
        height: 100vh;
        background-color: #090d13;
        background-image: radial-gradient(
          rgba(255, 255, 255, 0.03) 1px,
          transparent 0
        );
        background-size: 24px 24px;
      }

      /* Details Card Floating */
      .details-card {
        position: absolute;
        bottom: 24px;
        right: 24px;
        width: 350px;
        background: rgba(22, 27, 34, 0.9);
        backdrop-filter: blur(20px);
        border: 1px solid var(--panel-border);
        border-radius: 16px;
        padding: 20px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        z-index: 10;
        display: none;
        flex-direction: column;
        gap: 12px;
      }

      .details-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
      }

      .details-type-tag {
        font-size: 0.7rem;
        text-transform: uppercase;
        font-weight: 700;
        padding: 4px 8px;
        border-radius: 6px;
      }

      .details-title {
        font-family: var(--font-display);
        font-size: 1.1rem;
        font-weight: 700;
        color: #fff;
        margin-top: 4px;
        word-break: break-all;
      }

      .details-meta-item {
        font-size: 0.8rem;
        color: #8b949e;
        display: flex;
        flex-direction: column;
        gap: 3px;
      }

      .details-meta-val {
        color: #c9d1d9;
        font-family: monospace;
        background: rgba(0, 0, 0, 0.25);
        padding: 4px 8px;
        border-radius: 4px;
        word-break: break-all;
      }
    </style>
  </head>
  <body>
    <div class="sidebar">
      <div class="logo-section">
        <div class="logo-icon">LA</div>
        <div class="logo-title">Lint Arwaky Debugger</div>
      </div>

      <!-- File Loader -->
      <div class="loader-card">
        <div class="loader-title">1. Load Graph Data</div>
        <input type="file" id="file-input" class="file-input" accept=".json" />
        <div
          style="
            font-size: 0.7rem;
            color: #8b949e;
            margin-top: 4px;
            text-align: center;
          "
        >
          Run: <code>lint-arwaky-cli vscode-graph > graph.json</code>
        </div>
      </div>

      <!-- Search -->
      <div class="control-card">
        <div class="card-title">Search Symbol</div>
        <input
          type="text"
          id="search-input"
          class="search-input"
          placeholder="Type name to highlight..."
        />
      </div>

      <!-- Node Filters -->
      <div class="control-card">
        <div class="card-title">Visible Nodes</div>
        <label class="filter-item">
          <input
            type="checkbox"
            id="filter-file"
            class="filter-checkbox"
            checked
          />
          <span
            class="color-indicator"
            style="background-color: var(--color-file)"
          ></span>
          Files
        </label>
        <label class="filter-item">
          <input
            type="checkbox"
            id="filter-class"
            class="filter-checkbox"
            checked
          />
          <span
            class="color-indicator"
            style="background-color: var(--color-class)"
          ></span>
          Classes / Structs
        </label>
        <label class="filter-item">
          <input
            type="checkbox"
            id="filter-function"
            class="filter-checkbox"
            checked
          />
          <span
            class="color-indicator"
            style="background-color: var(--color-function)"
          ></span>
          Functions
        </label>
        <label class="filter-item">
          <input
            type="checkbox"
            id="filter-interface"
            class="filter-checkbox"
            checked
          />
          <span
            class="color-indicator"
            style="background-color: var(--color-interface)"
          ></span>
          Interfaces
        </label>
        <label class="filter-item">
          <input
            type="checkbox"
            id="filter-trait"
            class="filter-checkbox"
            checked
          />
          <span
            class="color-indicator"
            style="background-color: var(--color-trait)"
          ></span>
          Traits (Rust)
        </label>
      </div>

      <!-- Edge Filters -->
      <div class="control-card">
        <div class="card-title">Edge Relations</div>
        <label class="filter-item">
          <input
            type="checkbox"
            id="edge-call"
            class="filter-checkbox"
            checked
          />
          Calls (In/Out)
        </label>
        <label class="filter-item">
          <input
            type="checkbox"
            id="edge-lateral"
            class="filter-checkbox"
            checked
          />
          Lateral (AES Layer)
        </label>
        <label class="filter-item">
          <input
            type="checkbox"
            id="edge-inherit"
            class="filter-checkbox"
            checked
          />
          Inherits / Implements
        </label>
        <label class="filter-item">
          <input
            type="checkbox"
            id="edge-uses"
            class="filter-checkbox"
            checked
          />
          Uses / Structure
        </label>
      </div>

      <!-- Controls -->
      <div class="btn-group">
        <button id="btn-fit" class="btn">Fit Graph</button>
        <button id="btn-layout" class="btn">Re-Layout</button>
      </div>
    </div>

    <!-- Graph container -->
    <div id="cy"></div>

    <!-- Floating details card -->
    <div id="details-card" class="details-card">
      <div class="details-header">
        <div>
          <span id="details-tag" class="details-type-tag">File</span>
          <h4 id="details-title" class="details-title">SomeClass</h4>
        </div>
        <button
          id="details-close"
          style="
            background: none;
            border: none;
            color: #8b949e;
            cursor: pointer;
            font-size: 1.1rem;
          "
        >
          ×
        </button>
      </div>
      <div class="details-meta-item">
        <span>Location File:</span>
        <span id="details-file" class="details-meta-val"
          >crates/core/src/lib.rs</span
        >
      </div>
      <div
        id="details-line-container"
        class="details-meta-item"
        style="display: none"
      >
        <span>Line Number:</span>
        <span id="details-line" class="details-meta-val">124</span>
      </div>
    </div>

    <script>
      let cy = null;
      let originalElements = [];
      let selectedNode = null;

      // Auto-fetch graph.json on load
      fetch("graph.json")
        .then((res) => res.json())
        .then((data) => {
          console.log("Auto-loaded graph.json successfully!");
          renderGraph(data);
        })
        .catch((err) => {
          console.warn(
            "Auto-load graph.json via fetch failed (use Choose File button):",
            err.message,
          );
        });

      // Handle File Loading
      document
        .getElementById("file-input")
        .addEventListener("change", function (e) {
          const file = e.target.files[0];
          if (!file) return;

          const reader = new FileReader();
          reader.onload = function (evt) {
            try {
              const data = JSON.parse(evt.target.result);
              console.log("Loaded graph data successfully!", data);
              renderGraph(data);
            } catch (err) {
              alert("Failed to parse JSON file: " + err.message);
            }
          };
          reader.readAsText(file);
        });

      function renderGraph(data) {
        const elements = [];

        // Map Rust JSON nodes to Cytoscape format
        data.nodes.forEach((node) => {
          elements.push({
            group: "nodes",
            data: {
              id: node.id,
              label: node.label,
              kind: node.kind,
              file: node.file,
              line: node.line,
            },
          });
        });

        // Map Rust JSON edges to Cytoscape format
        data.edges.forEach((edge) => {
          elements.push({
            group: "edges",
            data: {
              id: edge.id,
              source: edge.source,
              target: edge.target,
              relation: edge.relation,
            },
          });
        });

        originalElements = elements;
        initializeCytoscape(elements);
      }

      function initializeCytoscape(elements) {
        console.log("Initializing Cytoscape with elements:", elements.length);
        if (cy) {
          cy.destroy();
        }

        cy = cytoscape({
          container: document.getElementById("cy"),
          elements: elements,
          style: [
            {
              selector: "node",
              style: {
                label: "data(label)",
                color: "#c9d1d9",
                "font-family": "Plus Jakarta Sans",
                "font-size": "11px",
                "text-valign": "bottom",
                "text-margin-y": "6px",
                "background-color": "#58a6ff",
                width: "22px",
                height: "22px",
                "transition-property":
                  "background-color, border-width, border-color",
                "transition-duration": "0.2s",
                "overlay-opacity": 0,
              },
            },
            {
              selector: 'node[kind="File"]',
              style: {
                "background-color": "#1f6feb",
                shape: "round-rectangle",
                width: "28px",
                height: "28px",
              },
            },
            {
              selector: 'node[kind="Class"]',
              style: {
                "background-color": "#34d399",
                shape: "ellipse",
              },
            },
            {
              selector: 'node[kind="Function"]',
              style: {
                "background-color": "#ff7b72",
                shape: "hexagon",
              },
            },
            {
              selector: 'node[kind="Interface"]',
              style: {
                "background-color": "#a78bfa",
                shape: "diamond",
              },
            },
            {
              selector: 'node[kind="Trait"]',
              style: {
                "background-color": "#fb923c",
                shape: "triangle",
              },
            },
            {
              selector: "edge",
              style: {
                width: 1.5,
                "line-color": "#30363d",
                "target-arrow-color": "#30363d",
                "target-arrow-shape": "triangle",
                "curve-style": "bezier",
                "arrow-scale": 0.8,
                "overlay-opacity": 0,
              },
            },
            {
              selector:
                'edge[relation="IncomingCall"], edge[relation="OutgoingCall"]',
              style: {
                "line-color": "#ff7b72",
                "target-arrow-color": "#ff7b72",
                "line-style": "dashed",
              },
            },
            {
              selector: 'edge[relation="Lateral"]',
              style: {
                "line-color": "#fb923c",
                "target-arrow-color": "#fb923c",
              },
            },
            {
              selector: 'edge[relation="Inherit"], edge[relation="Implement"]',
              style: {
                "line-color": "#a78bfa",
                "target-arrow-color": "#a78bfa",
              },
            },
            {
              selector: "node:selected",
              style: {
                "border-width": "3px",
                "border-color": "#fff",
                "shadow-blur": "10px",
                "shadow-color": "#fff",
                "shadow-opacity": 0.5,
              },
            },
            {
              selector: ".highlighted",
              style: {
                "background-color": "#f0e68c",
                "line-color": "#f0e68c",
                "target-arrow-color": "#f0e68c",
              },
            },
          ],
          layout: {
            name: "cose",
            animate: true,
            nodeRepulsion: function (node) {
              return 4000;
            },
            idealEdgeLength: function (edge) {
              return 80;
            },
            edgeElasticity: function (edge) {
              return 100;
            },
            nestingFactor: 1.2,
          },
        });

        // Node click event
        cy.on("tap", "node", function (evt) {
          const node = evt.target;
          selectedNode = node.data();
          showDetailsCard(selectedNode);
        });

        // Hide details card on tapping background
        cy.on("tap", function (evt) {
          if (evt.target === cy) {
            hideDetailsCard();
          }
        });

        console.log("Cytoscape initialized successfully!");
      }

      // Apply filters
      function applyFilters() {
        if (!cy) return;

        const visibleKinds = [];
        if (document.getElementById("filter-file").checked)
          visibleKinds.push("File");
        if (document.getElementById("filter-class").checked)
          visibleKinds.push("Class");
        if (document.getElementById("filter-function").checked)
          visibleKinds.push("Function");
        if (document.getElementById("filter-interface").checked)
          visibleKinds.push("Interface");
        if (document.getElementById("filter-trait").checked)
          visibleKinds.push("Trait");

        const visibleRelations = [];
        if (document.getElementById("edge-call").checked) {
          visibleRelations.push("IncomingCall");
          visibleRelations.push("OutgoingCall");
        }
        if (document.getElementById("edge-lateral").checked)
          visibleRelations.push("Lateral");
        if (document.getElementById("edge-inherit").checked) {
          visibleRelations.push("Inherit");
          visibleRelations.push("Implement");
        }
        if (document.getElementById("edge-uses").checked)
          visibleRelations.push("Uses");

        cy.batch(() => {
          cy.elements().remove();
          cy.add(originalElements);

          // Filter nodes
          const nodesToRemove = cy.nodes().filter((node) => {
            return !visibleKinds.includes(node.data("kind"));
          });
          nodesToRemove.remove();

          // Filter edges
          const edgesToRemove = cy.edges().filter((edge) => {
            return !visibleRelations.includes(edge.data("relation"));
          });
          edgesToRemove.remove();

          // Clean orphaned edges
          cy.edges()
            .filter((edge) => {
              return (
                !cy.getElementById(edge.data("source")).length ||
                !cy.getElementById(edge.data("target")).length
              );
            })
            .remove();
        });
      }

      // Add filter listeners
      document.querySelectorAll(".filter-checkbox").forEach((chk) => {
        chk.addEventListener("change", applyFilters);
      });

      // Search input event
      document
        .getElementById("search-input")
        .addEventListener("input", function (e) {
          const query = e.target.value.toLowerCase().trim();
          if (!cy) return;

          cy.batch(() => {
            cy.nodes().removeClass("highlighted");
            if (query.length > 0) {
              cy.nodes()
                .filter((node) => {
                  return node.data("label").toLowerCase().includes(query);
                })
                .addClass("highlighted");
            }
          });
        });

      // Detail Panel Helpers
      function showDetailsCard(nodeData) {
        const card = document.getElementById("details-card");
        const title = document.getElementById("details-title");
        const tag = document.getElementById("details-tag");
        const file = document.getElementById("details-file");
        const line = document.getElementById("details-line");
        const lineContainer = document.getElementById("details-line-container");

        title.innerText = nodeData.label;
        tag.innerText = nodeData.kind;

        // Adjust tag color based on kind
        tag.className = "details-type-tag";
        if (nodeData.kind === "File")
          tag.style.backgroundColor = "var(--color-file)";
        else if (nodeData.kind === "Class")
          tag.style.backgroundColor = "#047857";
        else if (nodeData.kind === "Function")
          tag.style.backgroundColor = "#b91c1c";
        else if (nodeData.kind === "Interface")
          tag.style.backgroundColor = "#6d28d9";
        else if (nodeData.kind === "Trait")
          tag.style.backgroundColor = "#c2410c";

        file.innerText = nodeData.file;

        if (nodeData.line) {
          line.innerText = nodeData.line;
          lineContainer.style.display = "flex";
        } else {
          lineContainer.style.display = "none";
        }

        card.style.display = "flex";
      }

      function hideDetailsCard() {
        document.getElementById("details-card").style.display = "none";
        selectedNode = null;
      }

      document
        .getElementById("details-close")
        .addEventListener("click", hideDetailsCard);

      // Fit & Layout Controls
      document.getElementById("btn-fit").addEventListener("click", () => {
        if (cy) cy.fit();
      });

      document.getElementById("btn-layout").addEventListener("click", () => {
        if (cy) {
          cy.layout({
            name: "cose",
            animate: true,
          }).run();
        }
      });
    </script>
  </body>
</html>
