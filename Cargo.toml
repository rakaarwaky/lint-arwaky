[workspace]
resolver = "2"
members = ["crates/*"]

[package]
name = "lint_arwaky-arwaky"
version = "1.10.11"
edition = "2021"
description = "Autonomous code quality and architecture enforcement for AI agents and developers, enforcing 27 Agentic Engineering System (AES) rules."
license = "MIT"
repository = "https://github.com/rakaarwaky/lint-arwaky"
homepage = "https://github.com/rakaarwaky/lint-arwaky"
readme = "README.md"

[lib]
name = "lint_arwaky"
path = "crates/lib.rs"

[[bin]]
name = "lint-arwaky-cli"
path = "crates/cli_main_entry.rs"

[[bin]]
name = "lint-arwaky-mcp"
path = "crates/mcp_main_entry.rs"

[[bin]]
name = "lint-arwaky-tui"
path = "crates/tui_main_entry.rs"

[features]
default = ["check_surfaces"]
watch = []
check_taxonomy = []
check_contract = ["check_taxonomy"]
check_capabilities = ["check_contract"]
check_infrastructure = ["check_contract"]
check_agent = ["check_capabilities", "check_infrastructure"]
check_surfaces = ["check_agent"]

[dependencies]
# Workspace member crates
shared = { package = "shared-lint-arwaky", path = "crates/shared" }
source_parsing = { package = "source_parsing-lint-arwaky", path = "crates/source-parsing" }
naming_rules = { package = "naming_rules-lint-arwaky", path = "crates/naming-rules" }
import_rules = { package = "import_rules-lint-arwaky", path = "crates/import-rules" }
output_report = { package = "output_report-lint-arwaky", path = "crates/output-report" }
pipeline_jobs = { package = "pipeline_jobs-lint-arwaky", path = "crates/pipeline-jobs" }
code_analysis = { package = "code_analysis-lint-arwaky", path = "crates/code-analysis" }
auto_fix = { package = "auto_fix-lint-arwaky", path = "crates/auto-fix" }
cli_commands = { package = "cli_commands-lint-arwaky", path = "crates/cli-commands" }
config_system = { package = "config_system-lint-arwaky", path = "crates/config-system" }
di_containers = { package = "di_containers-lint-arwaky", path = "crates/di-containers" }
file_system = { package = "file_system-lint-arwaky", path = "crates/file-system" }
file_watch = { package = "file_watch-lint-arwaky", path = "crates/file-watch" }
git_hooks = { package = "git_hooks-lint-arwaky", path = "crates/git-hooks" }
language_adapters = { package = "language_adapters-lint-arwaky", path = "crates/language-adapters" }
lifecycle_state = { package = "lifecycle_state-lint-arwaky", path = "crates/lifecycle-state" }
mcp_server = { package = "mcp_server-lint-arwaky", path = "crates/mcp-server" }
metrics_service = { package = "metrics_service-lint-arwaky", path = "crates/metrics-service" }
multi_project = { package = "multi_project-lint-arwaky", path = "crates/multi-project" }
orphan_detector = { package = "orphan_detector-lint-arwaky", path = "crates/orphan-detector" }
plugin_system = { package = "plugin_system-lint-arwaky", path = "crates/plugin-system" }
project_setup = { package = "project_setup-lint-arwaky", path = "crates/project-setup" }
role_rules = { package = "role_rules-lint-arwaky", path = "crates/role-rules" }

# External dependencies
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
regex = "1.10"
tokio = { version = "1.52.3", features = ["full"] }
once_cell = "1.21.4"
async-trait = "0.1.89"
thiserror = "1.0.52"
anyhow = "1.0.102"
serde_yaml = "0.9.34"
toml = "1.1.2"
clap = { version = "4.6.1", features = ["derive"] }
reqwest = { version = "0.13.4", features = ["blocking"] }
chrono = "0.4.44"
mcp-sdk-rs = "0.3.4"
rand = "0.10.1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
rustsec = "0.33"
dirs = "6.0"
dialoguer = "0.11"
console = "0.15"
ctrlc = "3.4"
futures = "0.3"

[profile.release]
opt-level = 2
