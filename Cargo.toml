[package]
name = "auto_linter_rust"
version = "1.10.2"
edition = "2024"

[[bin]]
name = "auto-linter"
path = "src-rust/main.rs"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
regex = "1.10"
tokio = { version = "1.52.3", features = ["full"] }
once_cell = "1.21.4"
async-trait = "0.1.89"
thiserror = "1.0.52"
anyhow = "1.0.102"
serde_yaml = "0.9.34"
toml = "1.1.2"
clap = { version = "4.6.1", features = ["derive"] }
reqwest = { version = "0.13.4", features = ["blocking"] }
chrono = "0.4.44"
mcp-sdk-rs = "0.3.4"
rand = "0.10.1"
