thresholds:
  score: 100.0
  complexity: 15

output_dir: "output"

adapters:
  - name: "clippy"
    weight: 1.0
  - name: "rustfmt"
    weight: 1.0
  - name: "cargo-audit"
    weight: 1.0
  - name: "architecture"
    weight: 3.0

ignored_rules: []

ignored_paths:
  - "./output"
  - "/target"
  - "/.git"
  - "/Graph-It-Live-arwaky"
  - "/.github"
  - "/scratch"
  - "/test-project-rust"
  - "/test-project-python"
  - "/test-project-javascript"

architecture:
  enabled: true
  layers:
    root:
      suffix:
        - strict: ["entry","container"]
    taxonomy:
      suffix:
        - strict: ["vo", "entity", "error", "event", "constant", "utility", "helper"] 
    contract:
      suffix:
        - strict: ["port", "protocol", "aggregate"]
    capabilities:
      suffix:
        - flexible:
            [
              "analyzer",
              "checker",
              "processor",
              "evaluator",
              "resolver",
              "validator",
              "formatter",
              "executor",
              "transformer",
              "calculator",
              "builder",
              "compiler",
              "aggregator",
              "classifier",
              "extractor",
              "reporter",
              "mapper",
              "filter",
              "collector",
              "comparator",
              "scorer",
              "inspector",
              "reviewer",
              "assessor",
              "auditor",
              "actions",
            ]
        - forbidden:
            [
              "vo",
              "entity",
              "error",
              "event",
              "constant",
              "constants",
              "utility", 
              "helper",
              "port",
              "protocol",
              "aggregate",
            ]
    infrastructure:
      suffix:
        - flexible:
            [
              "adapter",
              "provider",
              "scanner",
              "client",
              "schemas",
              "lifespan",
              "wrapper",
              "tracer",
              "tracker",
              "variants",
              "detector",
              "patterns",
              "system",
              "repository",
              "cache",
              "loader",
              "writer",
              "reader",
              "driver",
              "connector",
              "gateway",
              "serializer",
              "encoder",
              "decoder",
              "fetcher",
              "watcher",
              "indexer",
              "dispatcher",
              "recorder",
              "proxy",
              "publisher",
              "subscriber",
              "listener",
              "poller",
              "streamer",
            ]
        - forbidden:
            [
              "vo",
              "entity",
              "error",
              "event",
              "constant",
              "constants",
              "utility", 
              "helper",
              "port",
              "protocol",
              "aggregate",
            ]
    surfaces:
      suffix:
        - strict:
            [
              "command",
              "controller",
              "page",
              "view",
              "component",
              "router",
              "layout",
              "hook",
              "store",
              "action",
              "screen",
            ]
    agent:
      suffix:
        - strict: ["orchestrator"]

  rules:
    AES001:
      enabled: true
      scope:
        [
          "taxonomy",
          "contract",
          "capabilities",
          "infrastructure",
          "agent",
          "surfaces",
        ]
      exceptions:
        [
          "main.rs",
          "lib.rs",
          "mod.rs",
          "cli_main_entry.rs",
          "mcp_main_entry.rs",
          "tui_main_entry.rs",
        ]
      conditions:
        - scope: "taxonomy(vo)"
          allowed: ["taxonomy"]
          mandatory: null
          forbidden:
            [
              "agent",
              "infrastructure",
              "surfaces",
              "contract",
              "capabilities",
              "root",
            ]

        - scope: "taxonomy(entity,error,event)"
          allowed: ["taxonomy"]
          mandatory: ["taxonomy(vo|constant)"]
          forbidden:
            [
              "agent",
              "infrastructure",
              "surfaces",
              "contract",
              "capabilities",
              "root",
            ]

        - scope: "taxonomy(constant)"
          allowed: ["taxonomy"]
          mandatory: null
          forbidden:
            [
              "agent",
              "infrastructure",
              "surfaces",
              "contract",
              "capabilities",
              "root",
            ]

        - scope: "contract(port|protocol)"
          allowed: ["taxonomy", "contract"]
          mandatory: ["taxonomy"]
          forbidden:
            [
              "agent",
              "infrastructure",
              "surfaces",
              "capabilities",
              "contract(aggregate)",
              "root",
            ]

        - scope: "contract(aggregate)"
          allowed: ["taxonomy", "contract"]
          mandatory: ["taxonomy"]
          forbidden:
            ["agent", "infrastructure", "surfaces", "capabilities", "root"]
          forbidden_inheritance: ["contract(port)", "contract(protocol)"]

        - scope: "capabilities"
          allowed: ["taxonomy", "contract"]
          mandatory: ["taxonomy"]
          forbidden:
            ["infrastructure", "surfaces", "agent", "capabilities", "root"]

        - scope: "infrastructure"
          allowed: ["taxonomy", "contract"]
          mandatory: ["taxonomy"]
          forbidden:
            ["surfaces", "capabilities", "agent", "infrastructure", "root"]

        - scope: "agent(orchestrator)"
          allowed: ["taxonomy", "contract", "agent"]
          mandatory: ["taxonomy"]
          forbidden: ["surfaces", "infrastructure", "capabilities", "root"]

        - scope: "surfaces(command|controller|page|)"
          allowed: ["taxonomy", "contract"]
          mandatory: null
          forbidden:
            [
              "agent",
              "infrastructure",
              "capabilities",
              "contract(port)",
              "contract(protocol)",
              "root",
            ]

        - scope: "surfaces(hook|store|action|screen|router)"
          allowed: ["taxonomy"]
          mandatory: null
          forbidden:
            [
              "agent",
              "infrastructure",
              "capabilities",
              "contract(port)",
              "contract(protocol)",
              "surfaces(command|controller|page|entry)",
              "root",
            ]

        - scope: "surfaces(component|view|layout)"
          allowed: ["taxonomy"]
          mandatory: null
          forbidden:
            [
              "agent",
              "contract",
              "infrastructure",
              "capabilities",
              "surfaces(command|controller|page|entry|hook|store|action|screen|router)",
              "root",
            ]

    AES002:
      enabled: true
      scope:
        [
          "taxonomy",
          "contract",
          "capabilities",
          "infrastructure",
          "agent",
          "surfaces",
        ]
      exceptions:
        [
          "main.rs",
          "lib.rs",
          "mod.rs",
          "cli_main_entry.rs",
          "mcp_main_entry.rs",
          "tui_main_entry.rs",
        ]

    AES011:
      enabled: true
      scope:
        [
          "taxonomy",
          "contract",
          "capabilities",
          "infrastructure",
          "agent",
          "surfaces",
          "root",
        ]
      exceptions:
        [
          "main.rs",
          "lib.rs",
          "mod.rs",
          "root_cli_main_entry.rs",
          "root_mcp_main_entry.rs",
          "root_tui_main_entry.rs",
        ]

    AES012:
      enabled: true
      scope:
        [
          "taxonomy",
          "contract",
          "capabilities",
          "infrastructure",
          "agent",
          "surfaces",
          "root",
        ]
      exceptions:
        [
          "main.rs",
          "lib.rs",
          "mod.rs",
          "root_cli_main_entry.rs",
          "root_mcp_main_entry.rs",
          "root_tui_main_entry.rs",
        ]

    AES015:
      enabled: true
      scope:
        [
          "taxonomy",
          "contract",
          "capabilities",
          "infrastructure",
          "agent",
          "surfaces",
        ]

    AES0301:
      enabled: true
      scope:
        ["taxonomy(constant)", "taxonomy(entity,error,event)", "taxonomy(vo)"]

    AES0302:
      enabled: true
      scope: ["contract(aggregate)", "contract(port|protocol)"]
      exceptions:
        [
          "main.rs",
          "lib.rs",
          "mod.rs",
          "root_cli_main_entry.rs",
          "root_mcp_main_entry.rs",
          "root_tui_main_entry.rs",
        ]

    AES0303:
      enabled: true
      scope: ["capabilities"]
      max_functions: 30
      max_impl: 5
      exceptions:
        [
          "main.rs",
          "lib.rs",
          "mod.rs",
          "root_cli_main_entry.rs",
          "root_mcp_main_entry.rs",
          "root_tui_main_entry.rs",
        ]

    AES0305:
      enabled: true
      scope: ["agent(orchestrator)"]
      max_lines: 1000
      exceptions:
        [
          "main.rs",
          "lib.rs",
          "mod.rs",
          "root_cli_main_entry.rs",
          "root_mcp_main_entry.rs",
          "root_tui_main_entry.rs",
        ]

    AES0306:
      enabled: true
      scope:
        [
          "surfaces(command|controller|page|entry)",
          "surfaces(hook|store|action|screen|router)",
          "surfaces(component|view|layout)",
        ]
      max_functions: 15
      exceptions:
        [
          "main.rs",
          "lib.rs",
          "mod.rs",
          "root_cli_main_entry.rs",
          "root_mcp_main_entry.rs",
          "root_tui_main_entry.rs",
        ]

    AES020:
      enabled: true
      scope:
        [
          "taxonomy",
          "contract",
          "capabilities",
          "infrastructure",
          "agent",
          "surfaces",
        ]
      max_lines: 1000
      exceptions:
        [
          "main.rs",
          "lib.rs",
          "mod.rs",
          "root_cli_main_entry.rs",
          "root_mcp_main_entry.rs",
          "root_tui_main_entry.rs",
        ]

    AES021:
      enabled: true
      scope:
        [
          "taxonomy",
          "contract",
          "capabilities",
          "infrastructure",
          "agent",
          "surfaces",
        ]
      min_lines: 5
      exceptions:
        [
          "main.rs",
          "lib.rs",
          "mod.rs",
          "root_cli_main_entry.rs",
          "root_mcp_main_entry.rs",
          "root_tui_main_entry.rs",
        ]

    AES022:
      enabled: true
      scope:
        [
          "main.rs",
          "lib.rs",
          "mod.rs",
          "root_cli_main_entry.rs",
          "root_mcp_main_entry.rs",
          "root_tui_main_entry.rs",
        ]
      patterns:
        [
          "#[allow(",
          "unwrap()",
          "panic!",
          "noqa",
          "type: ignore",
          "eslint-disable",
        ]
      exceptions:
        [
          "main.rs",
          "lib.rs",
          "mod.rs",
          "root_cli_main_entry.rs",
          "root_mcp_main_entry.rs",
          "root_tui_main_entry.rs",
        ]

    AES023:
      enabled: true
      scope:
        [
          "taxonomy",
