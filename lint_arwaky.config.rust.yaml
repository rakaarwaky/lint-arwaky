thresholds:
  score: 100.0
  complexity: 15

adapters:
  - name: "clippy"
    weight: 1.0
  - name: "rustfmt"
    weight: 1.0
  - name: "cargo-audit"
    weight: 1.0
  - name: "architecture"
    weight: 3.0

ignored_rules: []

ignored_paths:
  - "/target"
  - "/.git"
  - "/.github"
  - "/scratch"
  - "/packages"
  - "/node_modules"
  - "/.opencode"
  - "/.mimocode"
  - "/.jj"
  - "/test-workspaces"
  - "/scripts"
  - ".min.js"
  - ".min.css"
  - "/.dsc_cache"
  - "/tests"
  - "/mimocode"
  - "build.rs"
  - "/build.rs"
  - "**/build.rs"

architecture:
  enabled: true
  rules:
    # ─── AES100: Naming ───
    AES101:
      enabled: true
      scope:
        [
          "taxonomy",
          "contract",
          "capabilities",
          "agent",
          "surfaces",
          "root",
        ]
      exceptions: ["main.rs", "lib.rs", "mod.rs"]

    AES102:
      enabled: true
      scope:
        [
          "taxonomy",
          "contract",
          "capabilities",
          "agent",
          "surfaces",
          "root",
        ]
      exceptions: ["main.rs", "lib.rs", "mod.rs"]
      layers:
        taxonomy:
          suffix:
            - strict: ["vo", "entity", "error", "event", "constant", "utility"]
        contract:
          suffix:
            - strict: ["port", "protocol", "aggregate"]
        capabilities:
          suffix:
            - flexible:
                [
                  "analyzer",
                  "checker",
                  "processor",
                  "evaluator",
                  "resolver",
                  "validator",
                  "formatter",
                  "executor",
                  "transformer",
                  "calculator",
                  "builder",
                  "compiler",
                  "classifier",
                  "extractor",
                  "reporter",
                  "mapper",
                  "filter",
                  "collector",
                  "comparator",
                  "scorer",
                  "inspector",
                  "reviewer",
                  "assessor",
                  "auditor",
                  "helper",
                ]
            - forbidden:
                [
                  "vo",
                  "entity",
                  "error",
                  "event",
                  "constant",
                  "constants",
                  "port",
                  "protocol",
                  "aggregate",
                  "utility",
                ]
        agent:
          suffix:
            - strict: ["orchestrator"]
        surfaces:
          suffix:
            - strict:
                [
                  "command",
                  "controller",
                  "page",
                  "view",
                  "component",
                  "router",
                  "layout",
                  "hook",
                  "store",
                  "action",
                  "screen",
                ]
        root:
          suffix:
            - strict: ["entry", "container"]

    # ─── AES200: Import ───
    AES201:
      enabled: true
      scope:
        [
          "taxonomy",
          "contract",
          "capabilities",
          "agent",
          "surfaces",
          "root",
        ]
      exceptions: ["main.rs", "lib.rs", "mod.rs"]
      conditions:
        - scope: "taxonomy(vo)"
          allowed: ["taxonomy"]
          mandatory: null
          forbidden:
            [
              "agent",
              "surfaces",
              "contract",
              "capabilities",
              "root",
            ]

        - scope: "taxonomy(entity,error,event)"
          allowed: ["taxonomy"]
          mandatory: ["taxonomy(vo|constant)"]
          forbidden:
            [
              "agent",
              "surfaces",
              "contract",
              "capabilities",
              "root",
            ]

        - scope: "taxonomy(constant)"
          allowed: ["taxonomy"]
          mandatory: null
          forbidden:
            [
              "agent",
              "surfaces",
              "contract",
              "capabilities",
              "root",
            ]

        - scope: "contract(port|protocol)"
          allowed: ["taxonomy", "contract"]
          mandatory: ["taxonomy"]
          forbidden:
            [
              "agent",
              "surfaces",
              "capabilities",
              "contract(aggregate)",
              "root",
            ]

        - scope: "contract(aggregate)"
          allowed: ["taxonomy", "contract"]
          mandatory: ["taxonomy"]
          forbidden:
            ["agent", "surfaces", "capabilities", "root"]
          forbidden_inheritance: ["contract(port)", "contract(protocol)"]

        - scope: "capabilities"
          allowed: ["taxonomy", "contract"]
          mandatory: ["taxonomy", "contract(protocol)"]
          forbidden:
            ["surfaces", "agent", "capabilities", "root"]
          allowed_imports:
            - layer: "taxonomy"
              purpose: "implement"
            - layer: "contract(port)"
              purpose: "implement"
            - layer: "contract(protocol|aggregate)"
              purpose: "call"

        - scope: "agent(orchestrator)"
          allowed:
            [
              "taxonomy",
              "contract(aggregate)",
              "contract(port)",
              "contract(protocol)",
            ]
          mandatory: ["taxonomy", "contract(aggregate)"]
          forbidden: ["surfaces", "capabilities", "root"]
          allowed_imports:
            - layer: "taxonomy"
              purpose: "implement"
            - layer: "contract(aggregate)"
              purpose: "implement"
            - layer: "contract(port)"
              purpose: "call"
            - layer: "contract(protocol)"
              purpose: "call"

        - scope: "surfaces(command|controller|page)"
          allowed: ["taxonomy", "contract(aggregate)"]
          mandatory: null
          forbidden:
            [
              "agent",
              "capabilities",
              "contract(port)",
              "contract(protocol)",
              "root",
            ]
          allowed_imports:
            - layer: "taxonomy"
              purpose: "implement"
            - layer: "contract(aggregate)"
              purpose: "call"

        - scope: "surfaces(hook|store|action|screen|router)"
          allowed: ["taxonomy"]
          mandatory: null
          forbidden:
            [
              "agent",
              "capabilities",
              "contract(port)",
              "contract(protocol)",
              "surfaces(command|controller|page|entry)",
              "root",
            ]
          allowed_imports:
            - layer: "taxonomy"
              purpose: "implement"

        - scope: "surfaces(component|view|layout)"
          allowed: ["taxonomy"]
          mandatory: null
          forbidden:
            [
              "agent",
              "contract",
              "capabilities",
              "surfaces(command|controller|page|entry|hook|store|action|screen|router)",
              "root",
            ]
          allowed_imports:
            - layer: "taxonomy"
              purpose: "implement"

        - scope: "root"
          allowed:
            [
              "taxonomy",
              "contract",
              "capabilities",
              "agent",
              "surfaces",
            ]
          mandatory: []
          forbidden: []
          allowed_imports:
            - layer: "taxonomy"
              purpose: "implement"
            - layer: "contract"
              purpose: "implement"
            - layer: "capabilities"
              purpose: "implement"
            - layer: "agent"
              purpose: "implement"
            - layer: "surfaces"
              purpose: "implement"

    AES202:
      enabled: true
      scope:
        [
          "taxonomy",
          "contract",
          "capabilities",
          "agent",
          "surfaces",
          "root",
        ]
      exceptions: ["main.rs", "lib.rs", "mod.rs"]
      conditions:
        - scope: "taxonomy(vo)"
          allowed: ["taxonomy"]
          mandatory: null
          forbidden:
            [
              "agent",
              "surfaces",
              "contract",
              "capabilities",
              "root",
            ]
          allowed_imports:
            - layer: "taxonomy"
              purpose: "implement"

        - scope: "taxonomy(entity,error,event)"
          allowed: ["taxonomy"]
          mandatory: ["taxonomy(vo|constant)"]
          forbidden:
            [
              "agent",
              "surfaces",
              "contract",
              "capabilities",
              "root",
            ]
          allowed_imports:
            - layer: "taxonomy"
              purpose: "implement"

        - scope: "taxonomy(constant)"
          allowed: ["taxonomy"]
          mandatory: null
          forbidden:
            [
              "agent",
              "surfaces",
              "contract",
              "capabilities",
              "root",
            ]
          allowed_imports:
            - layer: "taxonomy"
              purpose: "implement"

        - scope: "contract(port|protocol)"
          allowed: ["taxonomy", "contract"]
          mandatory: ["taxonomy"]
          forbidden:
            [
              "agent",
              "surfaces",
              "capabilities",
              "contract(aggregate)",
              "root",
            ]
          allowed_imports:
            - layer: "taxonomy"
              purpose: "implement"
            - layer: "contract"
              purpose: "implement"

        - scope: "contract(aggregate)"
          allowed: ["taxonomy", "contract"]
          mandatory: ["taxonomy"]
          forbidden:
            ["agent", "surfaces", "capabilities", "root"]
          allowed_imports:
            - layer: "taxonomy"
              purpose: "implement"
            - layer: "contract"
              purpose: "implement"

        - scope: "capabilities"
          allowed: ["taxonomy", "contract"]
          mandatory: ["taxonomy", "contract(protocol)"]
          forbidden:
            ["surfaces", "agent", "capabilities", "root"]
          allowed_imports:
            - layer: "taxonomy"
              purpose: "implement"
            - layer: "contract"
              purpose: "call"
            - layer: "contract(port|protocol|aggregate)"
              purpose: "call"

        - scope: "agent(orchestrator)"
          allowed:
            [
              "taxonomy",
              "contract(aggregate)",
              "contract(port)",
              "contract(protocol)",
            ]
          mandatory: ["taxonomy", "contract(aggregate)"]
          forbidden: ["surfaces", "capabilities", "root"]
          allowed_imports:
            - layer: "taxonomy"
              purpose: "implement"
            - layer: "contract(aggregate)"
              purpose: "implement"
            - layer: "contract(port)"
              purpose: "call"
            - layer: "contract(protocol)"
              purpose: "call"

        - scope: "root"
          allowed:
            [
              "taxonomy",
              "contract",
              "capabilities",
              "agent",
              "surfaces",
            ]
          mandatory: []
          forbidden: []
          allowed_imports:
            - layer: "taxonomy"
              purpose: "implement"
            - layer: "contract"
              purpose: "implement"
            - layer: "capabilities"
              purpose: "implement"
            - layer: "agent"
              purpose: "implement"
            - layer: "surfaces"
              purpose: "implement"

        - scope: "surfaces(command|controller|page)"
          allowed: ["taxonomy", "contract(aggregate)"]
          mandatory: null
          forbidden:
            [
              "agent",
              "capabilities",
              "contract(port)",
              "contract(protocol)",
              "root",
            ]
          allowed_imports:
            - layer: "taxonomy"
              purpose: "implement"
            - layer: "contract(aggregate)"
              purpose: "call"

        - scope: "surfaces(hook|store|action|screen|router)"
          allowed: ["taxonomy"]
          mandatory: null
          forbidden:
            [
              "agent",
              "capabilities",
              "contract(port)",
              "contract(protocol)",
              "surfaces(command|controller|page|entry)",
              "root",
            ]
          allowed_imports:
            - layer: "taxonomy"
              purpose: "implement"

        - scope: "surfaces(component|view|layout)"
          allowed: ["taxonomy"]
          mandatory: null
          forbidden:
            [
              "agent",
              "contract",
              "capabilities",
              "surfaces(command|controller|page|entry|hook|store|action|screen|router)",
              "root",
            ]
          allowed_imports:
            - layer: "taxonomy"
              purpose: "implement"

    AES203:
      enabled: true
      scope:
        [
          "taxonomy",
          "contract",
          "capabilities",
          "agent",
          "surfaces",
        ]
      exceptions:
        [
          "main.rs",
          "lib.rs",
          "mod.rs",
          "root_cli_main_entry.rs",
          "root_mcp_main_entry.rs",
          "root_tui_main_entry.rs",
        ]

    AES204:
      enabled: true
      scope:
        [
          "taxonomy",
          "contract",
          "capabilities",
          "agent",
          "surfaces",
        ]
      exceptions: ["main.rs", "lib.rs", "mod.rs"]

    AES205:
      enabled: true
      exceptions:
        [
          "main.rs",
          "lib.rs",
          "mod.rs",
        ]
      scope:
        [
          "taxonomy",
          "contract",
          "capabilities",
          "agent",
          "surfaces",
        ]

    # ─── AES300: Code Quality ───
    AES301:
      enabled: true
      scope:
        [
          "taxonomy",
          "contract",
          "capabilities",
          "agent",
          "surfaces",
        ]
      max_lines: 1000
      exceptions: ["main.rs", "lib.rs", "mod.rs"]

    AES302:
      enabled: true
      scope:
        [
          "taxonomy",
          "contract",
          "capabilities",
          "agent",
          "surfaces",
        ]
      min_lines: 5
      exceptions: ["main.rs", "lib.rs", "mod.rs"]

    AES303:
      enabled: true
      scope:
        [
          "taxonomy",
          "contract",
          "capabilities",
          "agent",
          "surfaces",
        ]
      exceptions: ["main.rs", "lib.rs", "mod.rs"]

    AES304:
      enabled: true
      scope:
        [
          "taxonomy",
          "contract",
          "capabilities",
          "agent",
          "surfaces",
          "root",
        ]
      forbidden_bypass:
        [
          "#[allow(",
          "unwrap",
          "expect",
          "panic",
          "todo",
          "unimplemented",
          "unreachable",
          "noqa",
          "type: ignore",
          "eslint-disable",
          "ts-ignore",
          "ts-expect-error",
          "pylint: disable",
        ]
      exceptions: ["main.rs", "lib.rs", "mod.rs"]

    AES305:
      enabled: true
      scope:
        [
          "taxonomy",
          "contract",
          "capabilities",
          "agent",
          "surfaces",
        ]
      exceptions: ["main.rs", "lib.rs", "mod.rs"]

    # ─── AES400: Role ───
    AES401:
      enabled: true
      scope:
        ["taxonomy(constant)", "taxonomy(entity,error,event)", "taxonomy(vo)"]

    AES402:
      enabled: true
      scope: ["contract(aggregate)", "contract(port|protocol)"]
      exceptions: ["main.rs", "lib.rs", "mod.rs"]

    AES403:
      enabled: true
      scope: ["capabilities"]
      max_functions: 30
      max_impl: 5
      exceptions: ["main.rs", "lib.rs", "mod.rs"]

    AES405:
      enabled: true
      scope: ["agent(orchestrator)"]
      max_lines: 1000
      exceptions: ["main.rs", "lib.rs", "mod.rs"]

    AES406:
      enabled: true
      scope:
        [
          "surfaces(command|controller|page|entry)",
          "surfaces(hook|store|action|screen|router)",
          "surfaces(component|view|layout)",
        ]
      max_functions: 15
      exceptions: ["main.rs", "lib.rs", "mod.rs"]

    # ─── AES500: Orphan ───
    AES501:
      enabled: true
      scope: ["taxonomy"]
      entry_points: []

    AES502:
      enabled: true
      scope: ["contract"]
      entry_points: []

    AES503:
      enabled: true
      scope: ["capabilities"]
      entry_points: []

    AES505:
      enabled: true
      scope: ["agent"]
      entry_points: []

    AES506:
      enabled: true
      scope: ["surfaces"]
      entry_points: []
