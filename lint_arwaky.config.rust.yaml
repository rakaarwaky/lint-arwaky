thresholds:
  score: 100.0
  complexity: 15

adapters:
  - name: "clippy"
    weight: 1.0
  - name: "rustfmt"
    weight: 1.0
  - name: "cargo-audit"
    weight: 1.0
  - name: "architecture"
    weight: 3.0

ignored_rules: []

ignored_paths:
  - "/target"
  - "/.git"
  - "/.github"
  - "/scratch"
  - "/packages"
  - "/node_modules"
  - "/.opencode"
  - "/.jj"
  - "/test-workspaces"
  - "/scripts"
  - ".min.js"
  - ".min.css"
  - "/.dsc_cache"

architecture:
  enabled: true
  rules:
    # ─── AES100: Naming ───
    AES101:
      enabled: true
      scope:
        [
          "taxonomy",
          "contract",
          "capabilities",
          "infrastructure",
          "agent",
          "surfaces",
          "root",
        ]
      exceptions: ["main.rs", "lib.rs", "mod.rs"]

    AES102:
      enabled: true
      scope:
        [
          "taxonomy",
          "contract",
          "capabilities",
          "infrastructure",
          "agent",
          "surfaces",
          "root",
        ]
      exceptions: ["main.rs", "lib.rs", "mod.rs"]
      layers:
        taxonomy:
          suffix:
            - strict:
                [
                  "vo",
                  "entity",
                  "error",
                  "event",
                  "constant",
                  "utility",
                  "helper",
                ]
        contract:
          suffix:
            - strict: ["port", "protocol", "aggregate"]
        capabilities:
          suffix:
            - flexible:
                [
                  "analyzer",
                  "checker",
                  "processor",
                  "evaluator",
                  "resolver",
                  "validator",
                  "formatter",
                  "executor",
                  "transformer",
                  "calculator",
                  "builder",
                  "compiler",
                  "classifier",
                  "extractor",
                  "reporter",
                  "mapper",
                  "filter",
                  "collector",
                  "comparator",
                  "scorer",
                  "inspector",
                  "reviewer",
                  "assessor",
                  "auditor",
                ]
            - forbidden:
                [
                  "vo",
                  "entity",
                  "error",
                  "event",
                  "constant",
                  "constants",
                  "utility",
                  "helper",
                  "port",
                  "protocol",
                  "aggregate",
                ]
        infrastructure:
          suffix:
            - flexible:
                [
                  "adapter",
                  "provider",
                  "scanner",
                  "client",
                  "schemas",
                  "lifespan",
                  "wrapper",
                  "tracer",
                  "tracker",
                  "variants",
                  "detector",
                  "patterns",
                  "system",
                  "repository",
                  "cache",
                  "loader",
                  "writer",
                  "reader",
                  "driver",
                  "connector",
                  "gateway",
                  "serializer",
                  "encoder",
                  "decoder",
                  "fetcher",
                  "watcher",
                  "indexer",
                  "dispatcher",
                  "recorder",
                  "proxy",
                  "publisher",
                  "subscriber",
                  "listener",
                  "poller",
                  "streamer",
                ]
            - forbidden:
                [
                  "vo",
                  "entity",
                  "error",
                  "event",
                  "constant",
                  "constants",
                  "utility",
                  "helper",
                  "port",
                  "protocol",
                  "aggregate",
                ]
        agent:
          suffix:
            - strict: ["orchestrator"]
        surfaces:
          suffix:
            - strict:
                [
                  "command",
                  "controller",
                  "page",
                  "view",
                  "component",
                  "router",
                  "layout",
                  "hook",
                  "store",
                  "action",
                  "screen",
                ]
        root:
          suffix:
            - strict: ["entry", "container"]

    # ─── AES200: Import ───
    AES201:
      enabled: true
      scope:
        [
          "taxonomy",
          "contract",
          "capabilities",
          "infrastructure",
          "agent",
          "surfaces",
          "root",
        ]
      exceptions: ["main.rs", "lib.rs", "mod.rs"]
      conditions:
        - scope: "taxonomy(vo)"
          allowed: ["taxonomy"]
          mandatory: null
          forbidden:
            [
              "agent",
              "infrastructure",
              "surfaces",
              "contract",
              "capabilities",
              "root",
            ]

        - scope: "taxonomy(entity,error,event)"
          allowed: ["taxonomy"]
          mandatory: ["taxonomy(vo|constant)"]
          forbidden:
            [
              "agent",
              "infrastructure",
              "surfaces",
              "contract",
              "capabilities",
              "root",
            ]

        - scope: "taxonomy(constant)"
          allowed: ["taxonomy"]
          mandatory: null
          forbidden:
            [
              "agent",
              "infrastructure",
              "surfaces",
              "contract",
              "capabilities",
              "root",
            ]

        - scope: "contract(port|protocol)"
          allowed: ["taxonomy", "contract"]
          mandatory: ["taxonomy"]
          forbidden:
            [
              "agent",
              "infrastructure",
              "surfaces",
              "capabilities",
              "contract(aggregate)",
              "root",
            ]

        - scope: "contract(aggregate)"
          allowed: ["taxonomy", "contract"]
          mandatory: ["taxonomy"]
          forbidden:
            ["agent", "infrastructure", "surfaces", "capabilities", "root"]
          forbidden_inheritance: ["contract(port)", "contract(protocol)"]

        - scope: "capabilities"
          allowed: ["taxonomy", "contract"]
          mandatory: ["taxonomy", "contract(protocol)"]
          forbidden:
            ["infrastructure", "surfaces", "agent", "capabilities", "root"]
          allowed_imports:
            - layer: "taxonomy"
              purpose: "implement"
            - layer: "contract(port)"
              purpose: "implement"
            - layer: "contract(protocol|aggregate)"
              purpose: "call"

        - scope: "infrastructure"
          allowed: ["taxonomy", "contract"]
          mandatory: ["taxonomy", "contract(port)"]
          forbidden:
            ["surfaces", "capabilities", "agent", "infrastructure", "root"]
          allowed_imports:
            - layer: "taxonomy"
              purpose: "implement"
            - layer: "contract(port)"
              purpose: "implement"
            - layer: "contract(protocol|aggregate)"
              purpose: "call"

        - scope: "agent(orchestrator)"
          allowed:
            [
              "taxonomy",
              "contract(aggregate)",
              "contract(port)",
              "contract(protocol)",
            ]
          mandatory: ["taxonomy", "contract(aggregate)"]
          forbidden: ["surfaces", "infrastructure", "capabilities", "root"]
          allowed_imports:
            - layer: "taxonomy"
              purpose: "implement"
            - layer: "contract(aggregate)"
              purpose: "implement"
            - layer: "contract(port)"
              purpose: "call"
            - layer: "contract(protocol)"
              purpose: "call"

        - scope: "surfaces(command|controller|page)"
          allowed: ["taxonomy", "contract(aggregate)"]
          mandatory: null
          forbidden:
            [
              "agent",
              "infrastructure",
              "capabilities",
              "contract(port)",
              "contract(protocol)",
              "root",
            ]
          allowed_imports:
            - layer: "taxonomy"
              purpose: "implement"
            - layer: "contract(aggregate)"
              purpose: "call"

        - scope: "surfaces(hook|store|action|screen|router)"
          allowed: ["taxonomy"]
          mandatory: null
          forbidden:
            [
              "agent",
              "infrastructure",
              "capabilities",
              "contract(port)",
              "contract(protocol)",
              "surfaces(command|controller|page|entry)",
              "root",
            ]
          allowed_imports:
            - layer: "taxonomy"
              purpose: "implement"

        - scope: "surfaces(component|view|layout)"
          allowed: ["taxonomy"]
          mandatory: null
          forbidden:
            [
              "agent",
              "contract",
              "infrastructure",
              "capabilities",
              "surfaces(command|controller|page|entry|hook|store|action|screen|router)",
              "root",
            ]
          allowed_imports:
            - layer: "taxonomy"
              purpose: "implement"

        - scope: "root"
          allowed:
            [
              "taxonomy",
              "contract",
              "capabilities",
              "infrastructure",
              "agent",
              "surfaces",
            ]
          mandatory: []
          forbidden: []
          allowed_imports:
            - layer: "taxonomy"
              purpose: "implement"
            - layer: "contract"
              purpose: "implement"
            - layer: "capabilities"
              purpose: "implement"
            - layer: "infrastructure"
              purpose: "implement"
            - layer: "agent"
              purpose: "implement"
            - layer: "surfaces"
              purpose: "implement"

    AES202:
      enabled: true
      scope:
        [
          "taxonomy",
          "contract",
          "capabilities",
          "infrastructure",
          "agent",
          "surfaces",
          "root",
        ]
      exceptions: ["main.rs", "lib.rs", "mod.rs"]
      conditions:
        - scope: "taxonomy(vo)"
          allowed: ["taxonomy"]
          mandatory: null
          forbidden:
            [
              "agent",
              "infrastructure",
              "surfaces",
              "contract",
              "capabilities",
              "root",
            ]
          allowed_imports:
            - layer: "taxonomy"
              purpose: "implement"

        - scope: "taxonomy(entity,error,event)"
          allowed: ["taxonomy"]
          mandatory: ["taxonomy(vo|constant)"]
          forbidden:
            [
              "agent",
              "infrastructure",
              "surfaces",
              "contract",
              "capabilities",
              "root",
            ]
          allowed_imports:
            - layer: "taxonomy"
              purpose: "implement"

        - scope: "taxonomy(constant)"
          allowed: ["taxonomy"]
          mandatory: null
          forbidden:
            [
              "agent",
              "infrastructure",
              "surfaces",
              "contract",
              "capabilities",
              "root",
            ]
          allowed_imports:
            - layer: "taxonomy"
              purpose: "implement"

        - scope: "contract(port|protocol)"
          allowed: ["taxonomy", "contract"]
          mandatory: ["taxonomy"]
          forbidden:
            [
              "agent",
              "infrastructure",
              "surfaces",
              "capabilities",
              "contract(aggregate)",
              "root",
            ]
          allowed_imports:
            - layer: "taxonomy"
              purpose: "implement"
            - layer: "contract"
              purpose: "implement"

        - scope: "contract(aggregate)"
          allowed: ["taxonomy", "contract"]
          mandatory: ["taxonomy"]
          forbidden:
            ["agent", "infrastructure", "surfaces", "capabilities", "root"]
          allowed_imports:
            - layer: "taxonomy"
              purpose: "implement"
            - layer: "contract"
              purpose: "implement"

        - scope: "capabilities"
          allowed: ["taxonomy", "contract"]
          mandatory: ["taxonomy", "contract(protocol)"]
          forbidden:
            ["infrastructure", "surfaces", "agent", "capabilities", "root"]
          allowed_imports:
            - layer: "taxonomy"
              purpose: "implement"
            - layer: "contract"
              purpose: "call"
            - layer: "contract(port|protocol|aggregate)"
              purpose: "call"

        - scope: "infrastructure"
          allowed: ["taxonomy", "contract"]
          mandatory: ["taxonomy", "contract(port)"]
          forbidden:
            ["surfaces", "capabilities", "agent", "infrastructure", "root"]
          allowed_imports:
            - layer: "taxonomy"
              purpose: "implement"
            - layer: "contract"
              purpose: "call"
            - layer: "contract(port|protocol|aggregate)"
              purpose: "call"

        - scope: "agent(orchestrator)"
          allowed:
            [
              "taxonomy",
              "contract(aggregate)",
              "contract(port)",
              "contract(protocol)",
            ]
          mandatory: ["taxonomy", "contract(aggregate)"]
          forbidden: ["surfaces", "infrastructure", "capabilities", "root"]
          allowed_imports:
            - layer: "taxonomy"
              purpose: "implement"
            - layer: "contract(aggregate)"
              purpose: "implement"
            - layer: "contract(port)"
              purpose: "call"
            - layer: "contract(protocol)"
              purpose: "call"

        - scope: "root"
          allowed:
            [
              "taxonomy",
              "contract",
              "capabilities",
              "infrastructure",
              "agent",
              "surfaces",
            ]
          mandatory: []
          forbidden: []
          allowed_imports:
            - layer: "taxonomy"
              purpose: "implement"
            - layer: "contract"
              purpose: "implement"
            - layer: "capabilities"
              purpose: "implement"
            - layer: "infrastructure"
              purpose: "implement"
            - layer: "agent"
              purpose: "implement"
            - layer: "surfaces"
              purpose: "implement"

        - scope: "surfaces(command|controller|page)"
          allowed: ["taxonomy", "contract(aggregate)"]
          mandatory: null
          forbidden:
            [
              "agent",
              "infrastructure",
              "capabilities",
              "contract(port)",
              "contract(protocol)",
              "root",
            ]
          allowed_imports:
            - layer: "taxonomy"
              purpose: "implement"
            - layer: "contract(aggregate)"
              purpose: "call"

        - scope: "surfaces(hook|store|action|screen|router)"
          allowed: ["taxonomy"]
          mandatory: null
          forbidden:
            [
              "agent",
              "infrastructure",
              "capabilities",
              "contract(port)",
              "contract(protocol)",
              "surfaces(command|controller|page|entry)",
              "root",
            ]
          allowed_imports:
            - layer: "taxonomy"
              purpose: "implement"

        - scope: "surfaces(component|view|layout)"
          allowed: ["taxonomy"]
          mandatory: null
          forbidden:
            [
              "agent",
              "contract",
              "infrastructure",
              "capabilities",
              "surfaces(command|controller|page|entry|hook|store|action|screen|router)",
              "root",
            ]
          allowed_imports:
            - layer: "taxonomy"
              purpose: "implement"

    AES203:
      enabled: true
      scope:
        [
          "taxonomy",
          "contract",
          "capabilities",
          "infrastructure",
          "agent",
          "surfaces",
        ]
      exceptions:
        [
          "main.rs",
          "lib.rs",
          "mod.rs",
          "root_cli_main_entry.rs",
          "root_mcp_main_entry.rs",
          "root_tui_main_entry.rs",
        ]

    AES204:
      enabled: true
      scope:
        [
          "taxonomy",
          "contract",
          "capabilities",
          "infrastructure",
          "agent",
          "surfaces",
        ]
      exceptions: ["main.rs", "lib.rs", "mod.rs"]

    AES205:
      enabled: true
      exceptions: ["main.rs", "lib.rs", "mod.rs", "taxonomy_fix_applied_event.rs", "contract_fix_aggregate.rs", "taxonomy_fix_vo.rs", "contract_fix_protocol.rs", "contract_executor_port.rs", "taxonomy_symbol_renamer_utility.rs"]
      scope:
        [
          "taxonomy",
          "contract",
          "capabilities",
          "infrastructure",
          "agent",
          "surfaces",
        ]

    # ─── AES300: Code Quality ───
    AES301:
      enabled: true
      scope:
        [
          "taxonomy",
          "contract",
          "capabilities",
          "infrastructure",
          "agent",
          "surfaces",
        ]
      max_lines: 1000
      exceptions: ["main.rs", "lib.rs", "mod.rs"]

    AES302:
      enabled: true
      scope:
        [
          "taxonomy",
          "contract",
          "capabilities",
          "infrastructure",
          "agent",
          "surfaces",
        ]
      min_lines: 5
      exceptions: ["main.rs", "lib.rs", "mod.rs"]

    AES303:
      enabled: true
      scope:
        [
          "taxonomy",
          "contract",
          "capabilities",
          "infrastructure",
          "agent",
          "surfaces",
        ]
      exceptions: ["main.rs", "lib.rs", "mod.rs"]

    AES304:
      enabled: true
      scope:
        [
          "taxonomy",
          "contract",
          "capabilities",
          "infrastructure",
          "agent",
          "surfaces",
          "root",
        ]
      forbidden_bypass:
        [
          "#[allow(",
          "unwrap",
          "expect",
          "panic",
          "todo",
          "unimplemented",
          "unreachable",
          "noqa",
          "type: ignore",
          "eslint-disable",
          "ts-ignore",
          "ts-expect-error",
          "pylint: disable",
        ]
      exceptions: ["main.rs", "lib.rs", "mod.rs"]

    AES305:
      enabled: true
      scope:
        [
          "taxonomy",
          "contract",
          "capabilities",
          "infrastructure",
          "agent",
          "surfaces",
        ]
      exceptions: ["main.rs", "lib.rs", "mod.rs"]

    # ─── AES400: Role ───
    AES401:
      enabled: true
      scope:
        ["taxonomy(constant)", "taxonomy(entity,error,event)", "taxonomy(vo)"]

    AES402:
      enabled: true
      scope: ["contract(aggregate)", "contract(port|protocol)"]
      exceptions: ["main.rs", "lib.rs", "mod.rs"]

    AES403:
      enabled: true
      scope: ["capabilities"]
      max_functions: 30
      max_impl: 5
      exceptions: ["main.rs", "lib.rs", "mod.rs"]

    AES404:
      enabled: true
      scope: ["infrastructure"]
      exceptions: ["main.rs", "lib.rs", "mod.rs"]

    AES405:
      enabled: true
      scope: ["agent(orchestrator)"]
      max_lines: 1000
      exceptions: ["main.rs", "lib.rs", "mod.rs"]

    AES406:
      enabled: true
      scope:
        [
          "surfaces(command|controller|page|entry)",
          "surfaces(hook|store|action|screen|router)",
          "surfaces(component|view|layout)",
        ]
      max_functions: 15
      exceptions: ["main.rs", "lib.rs", "mod.rs"]

    # ─── AES500: Orphan ───
    AES501:
      enabled: true
      scope: ["taxonomy"]
      entry_points: []
      # shared/ is a definitions-only library crate; its taxonomy files are imported by feature crates,
      # not within shared itself — scanning shared in isolation produces false-positive orphan reports.
      exceptions:
        - "taxonomy_fix_applied_event.rs"
        - "taxonomy_fix_vo.rs"
        - "taxonomy_catalog_constant.rs"
        - "taxonomy_command_catalog_vo.rs"
        - "taxonomy_metadata_vo.rs"
        - "taxonomy_position_vo.rs"
        - "taxonomy_cli_vo.rs"
        - "taxonomy_protocol_vo.rs"
        - "taxonomy_result_vo.rs"
        - "taxonomy_score_vo.rs"
        - "taxonomy_severity_vo.rs"
        - "taxonomy_code_analysis_rule_vo.rs"
        - "taxonomy_operation_error.rs"
        - "taxonomy_analysis_vo.rs"
        - "taxonomy_import_source_vo.rs"
        - "taxonomy_violation_code_analysis_vo.rs"
        - "taxonomy_adapter_name_vo.rs"
        - "taxonomy_error_vo.rs"
        - "taxonomy_lint_vo.rs"
        - "taxonomy_response_data_vo.rs"
        - "taxonomy_severity_vo.rs"
        - "taxonomy_job_vo.rs"
        - "taxonomy_suggestion_vo.rs"
        - "taxonomy_action_vo.rs"
        - "taxonomy_duration_vo.rs"
        - "taxonomy_job_id_vo.rs"
        - "taxonomy_message_vo.rs"
        - "taxonomy_source_vo.rs"
        - "taxonomy_config_error.rs"
        - "taxonomy_identifier_vo.rs"
        - "taxonomy_setting_vo.rs"
        - "taxonomy_validation_vo.rs"
        - "taxonomy_config_vo.rs"
        - "taxonomy_multi_project_workspace_info_vo.rs"
        - "taxonomy_multi_project_vo.rs"
        - "taxonomy_multi_project_summary_vo.rs"
        - "taxonomy_filesystem_error.rs"
        - "taxonomy_diff_result_vo.rs"
        - "taxonomy_service_error.rs"
        - "taxonomy_watch_config_vo.rs"
        - "taxonomy_watch_event_vo.rs"
        - "taxonomy_hook_error.rs"
        - "taxonomy_git_diff_data_vo.rs"
        - "taxonomy_import_rule_vo.rs"
        - "taxonomy_dependency_edge_vo.rs"
        - "taxonomy_language_vo.rs"
        - "taxonomy_violation_import_vo.rs"
        - "taxonomy_naming_rule_vo.rs"
        - "taxonomy_suffix_vo.rs"
        - "taxonomy_naming_violation_vo.rs"
        - "taxonomy_orphan_rule_vo.rs"
        - "taxonomy_orphan_contract_vo.rs"
        - "taxonomy_violation_orphan_vo.rs"
        - "taxonomy_doctor_vo.rs"
        - "taxonomy_stats_vo.rs"
        - "taxonomy_setup_contract_vo.rs"
        - "taxonomy_role_rule_vo.rs"
        - "taxonomy_violation_role_vo.rs"
        - "taxonomy_layer_names_constant.rs"
        - "taxonomy_layer_names_vo.rs"
        - "taxonomy_naming_list_vo.rs"
        - "taxonomy_parser_error.rs"
        - "taxonomy_path_vo.rs"
        - "taxonomy_paths_vo.rs"
        - "taxonomy_adapter_error.rs"

    AES502:
      enabled: true
      scope: ["contract"]
      entry_points: []
      # shared/ contracts are implemented in feature crates, not within shared itself.
      exceptions:
        - "contract_fix_aggregate.rs"
        - "contract_fix_protocol.rs"
        - "contract_executor_port.rs"
        - "contract_adapter_port.rs"
        - "contract_bypass_checker_protocol.rs"
        - "contract_class_protocol.rs"
        - "contract_code_metric_analyzer_protocol.rs"
        - "contract_dead_inheritance_protocol.rs"
        - "contract_layer_detection_aggregate.rs"
        - "contract_line_protocol.rs"
        - "contract_code_analysis_aggregate.rs"
        - "contract_cycle_protocol.rs"
        - "contract_orchestration_aggregate.rs"
        - "contract_parser_port.rs"
        - "contract_reader_port.rs"
        - "contract_validator_protocol.rs"
        - "contract_workspace_detector_port.rs"
        - "contract_multi_project_orchestrator_aggregate.rs"
        - "contract_external_lint_aggregate.rs"
        - "contract_system_port.rs"
        - "contract_provider_port.rs"
        - "contract_watch_aggregate.rs"
        - "contract_change_analyzer_protocol.rs"
        - "contract_git_hooks_aggregate.rs"
        - "contract_manager_port.rs"
        - "contract_orchestrator_aggregate.rs"
        - "contract_hook_protocol.rs"
        - "contract_diff_protocol.rs"
        - "contract_import_runner_aggregate.rs"
        - "contract_rule_protocol.rs"
        - "contract_unused_import_protocol.rs"
        - "contract_import_parser_port.rs"
        - "contract_naming_runner_aggregate.rs"
        - "contract_naming_filesystem_port.rs"
        - "contract_naming_checker_protocol.rs"
        - "contract_naming_analyzer_protocol.rs"
        - "contract_orphan_aggregate.rs"
        - "contract_orphan_protocol.rs"
        - "contract_orphan_graph_resolver_protocol.rs"
        - "contract_maintenance_aggregate.rs"
        - "contract_setup_aggregate.rs"
        - "contract_setup_protocol.rs"
        - "contract_maintenance_protocol.rs"
        - "contract_agent_role_protocol.rs"
        - "contract_capabilities_role_protocol.rs"
        - "contract_infrastructure_role_protocol.rs"
        - "contract_role_aggregate.rs"
        - "contract_role_protocol.rs"
        - "contract_role_runner_aggregate.rs"
        - "contract_surface_role_protocol.rs"
        - "contract_taxonomy_role_protocol.rs"
        - "contract_language_detector_port.rs"
        - "contract_parser_port.rs"
        - "contract_path_normalization_port.rs"
        - "contract_scanner_provider_port.rs"

    AES503:
      enabled: true
      scope: ["capabilities"]
      entry_points: []

    AES504:
      enabled: true
      scope: ["infrastructure"]
      entry_points: []

    AES505:
      enabled: true
      scope: ["agent"]
      entry_points: []

    AES506:
      enabled: true
      scope: ["surfaces"]
      entry_points: []
