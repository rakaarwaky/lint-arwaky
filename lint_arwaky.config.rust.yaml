thresholds:
  score: 100.0
  complexity: 15

output_dir: "output"

adapters:
  - name: "clippy"
    weight: 1.0
  - name: "rustfmt"
    weight: 1.0
  - name: "cargo-audit"
    weight: 1.0
  - name: "architecture"
    weight: 3.0

ignored_rules: []

ignored_paths:
  - "./output"
  - "/target"
  - "/.git"
  - "/Graph-It-Live"
  - "/.github"
  - "/scratch"
  - "/test-project-rust"
  - "/test-project-python"
  - "/test-project-javascript"
  - "/packages"
  - "/node_modules"
  - "/.opencode"
  - "/.jj"

architecture:
  enabled: true
  rules:
    # ─── AES100: Naming ───
    AES101:
      enabled: true
      scope:
        [
          "taxonomy",
          "contract",
          "capabilities",
          "infrastructure",
          "agent",
          "surfaces",
          "root",
        ]
      exceptions:
        [
          "main.rs",
          "lib.rs",
          "mod.rs",
          "root_cli_main_entry.rs",
          "root_mcp_main_entry.rs",
          "root_tui_main_entry.rs",
        ]

    AES102:
      enabled: true
      scope:
        [
          "taxonomy",
          "contract",
          "capabilities",
          "infrastructure",
          "agent",
          "surfaces",
          "root",
        ]
      exceptions:
        [
          "main.rs",
          "lib.rs",
          "mod.rs",
          "root_cli_main_entry.rs",
          "root_mcp_main_entry.rs",
          "root_tui_main_entry.rs",
        ]
      layers:
        taxonomy:
          path: "crates/shared"
          suffix:
            - strict: ["vo", "entity", "error", "event", "constant"]
        contract:
          path: "crates/shared"
          suffix:
            - strict: ["port", "protocol", "aggregate"]
        capabilities:
          path: "crates"
          suffix:
            - flexible:
                [
                  "analyzer",
                  "checker",
                  "processor",
                  "evaluator",
                  "resolver",
                  "validator",
                  "formatter",
                  "executor",
                  "transformer",
                  "calculator",
                  "builder",
                  "compiler",
                  "aggregator",
                  "classifier",
                  "extractor",
                  "reporter",
                  "mapper",
                  "filter",
                  "collector",
                  "comparator",
                  "scorer",
                  "inspector",
                  "reviewer",
                  "assessor",
                  "auditor",
                  "actions",
                ]
            - forbidden:
                [
                  "vo",
                  "entity",
                  "error",
                  "event",
                  "constant",
                  "constants",
                  "utility",
                  "helper",
                  "port",
                  "protocol",
                  "aggregate",
                ]
        infrastructure:
          path: "crates"
          suffix:
            - flexible:
                [
                  "adapter",
                  "provider",
                  "scanner",
                  "client",
                  "schemas",
                  "lifespan",
                  "wrapper",
                  "tracer",
                  "tracker",
                  "variants",
                  "detector",
                  "patterns",
                  "system",
                  "repository",
                  "cache",
                  "loader",
                  "writer",
                  "reader",
                  "driver",
                  "connector",
                  "gateway",
                  "serializer",
                  "encoder",
                  "decoder",
                  "fetcher",
                  "watcher",
                  "indexer",
                  "dispatcher",
                  "recorder",
                  "proxy",
                  "publisher",
                  "subscriber",
                  "listener",
                  "poller",
                  "streamer",
                ]
            - forbidden:
                [
                  "vo",
                  "entity",
                  "error",
                  "event",
                  "constant",
                  "constants",
                  "utility",
                  "helper",
                  "port",
                  "protocol",
                  "aggregate",
                ]
        agent:
          path: "crates"
          suffix:
            - strict: ["orchestrator"]
        surfaces:
          path: "crates"
          suffix:
            - strict:
                [
                  "command",
                  "controller",
                  "page",
                  "view",
                  "component",
                  "router",
                  "layout",
                  "hook",
                  "store",
                  "action",
                  "screen",
                ]
        root:
          path: "crates"
          suffix:
            - strict: ["entry", "container"]

    # ─── AES200: Import ───
    AES201:
      enabled: true
      scope:
        [
          "taxonomy",
          "contract",
          "capabilities",
          "infrastructure",
          "agent",
          "surfaces",
          "root",
        ]
      exceptions:
        [
          "main.rs",
          "lib.rs",
          "mod.rs",
          "cli_main_entry.rs",
          "mcp_main_entry.rs",
          "tui_main_entry.rs",
          "root_cli_main_entry.rs",
          "root_mcp_main_entry.rs",
          "root_tui_main_entry.rs",
          "surface_multi_command.rs",
          "surface_watch_command.rs",
          "surface_check_command.rs",
          "capabilities_arch_lint.rs",
          "surface_tools_command.rs",
          "surface_job_controller.rs",
          "agent_orphan_orchestrator.rs",
          "surface_vscode_command.rs",
          "infrastructure_vscode_graph_generator.rs",
          "infrastructure_language_detector.rs",
          "root_source_parsing_container.rs",
          "surface_git_command.rs",
          "surface_dev_command.rs",
          "surface_map_command.rs",
        ]
      conditions:
        - scope: "taxonomy(vo)"
          allowed: ["taxonomy"]
          mandatory: null
          forbidden:
            [
              "agent",
              "infrastructure",
              "surfaces",
              "contract",
              "capabilities",
              "root",
            ]

        - scope: "taxonomy(entity,error,event)"
          allowed: ["taxonomy"]
          mandatory: ["taxonomy(vo|constant)"]
          forbidden:
            [
              "agent",
              "infrastructure",
              "surfaces",
              "contract",
              "capabilities",
              "root",
            ]

        - scope: "taxonomy(constant)"
          allowed: ["taxonomy"]
          mandatory: null
          forbidden:
            [
              "agent",
              "infrastructure",
              "surfaces",
              "contract",
              "capabilities",
              "root",
            ]

        - scope: "contract(port|protocol)"
          allowed: ["taxonomy", "contract"]
          mandatory: ["taxonomy"]
          forbidden:
            [
              "agent",
              "infrastructure",
              "surfaces",
              "capabilities",
              "contract(aggregate)",
              "root",
            ]

        - scope: "contract(aggregate)"
          allowed: ["taxonomy", "contract"]
          mandatory: ["taxonomy"]
          forbidden:
            ["agent", "infrastructure", "surfaces", "capabilities", "root"]
          forbidden_inheritance: ["contract(port)", "contract(protocol)"]

        - scope: "capabilities"
          allowed: ["taxonomy", "contract"]
          mandatory: ["taxonomy"]
          forbidden:
            ["infrastructure", "surfaces", "agent", "capabilities", "root"]
          allowed_imports:
            - layer: "taxonomy"
              purpose: "implement"
            - layer: "contract"
              purpose: "call"
            - layer: "contract(port|protocol|aggregate)"
              purpose: "call"

        - scope: "infrastructure"
          allowed: ["taxonomy", "contract"]
          mandatory: ["taxonomy"]
          forbidden:
            ["surfaces", "capabilities", "agent", "infrastructure", "root"]
          allowed_imports:
            - layer: "taxonomy"
              purpose: "implement"
            - layer: "contract"
              purpose: "call"
            - layer: "contract(port|protocol|aggregate)"
              purpose: "call"

        - scope: "agent(orchestrator)"
          allowed:
            [
              "taxonomy",
              "contract(aggregate)",
              "contract(port)",
              "contract(protocol)",
            ]
          mandatory: ["taxonomy", "contract(aggregate)"]
          forbidden: ["surfaces", "infrastructure", "capabilities", "root"]
          allowed_imports:
            - layer: "taxonomy"
              purpose: "implement"
            - layer: "contract(aggregate)"
              purpose: "implement"
            - layer: "contract(port)"
              purpose: "call"
            - layer: "contract(protocol)"
              purpose: "call"

        - scope: "surfaces(command|controller|page)"
          allowed: ["taxonomy", "contract(aggregate)"]
          mandatory: null
          forbidden:
            [
              "agent",
              "infrastructure",
              "capabilities",
              "contract(port)",
              "contract(protocol)",
              "root",
            ]
          allowed_imports:
            - layer: "taxonomy"
              purpose: "implement"
            - layer: "contract(aggregate)"
              purpose: "call"

        - scope: "surfaces(hook|store|action|screen|router)"
          allowed: ["taxonomy"]
          mandatory: null
          forbidden:
            [
              "agent",
              "infrastructure",
              "capabilities",
              "contract(port)",
              "contract(protocol)",
              "surfaces(command|controller|page|entry)",
              "root",
            ]
          allowed_imports:
            - layer: "taxonomy"
              purpose: "implement"

        - scope: "surfaces(component|view|layout)"
          allowed: ["taxonomy"]
          mandatory: null
          forbidden:
            [
              "agent",
              "contract",
              "infrastructure",
              "capabilities",
              "surfaces(command|controller|page|entry|hook|store|action|screen|router)",
              "root",
            ]
          allowed_imports:
            - layer: "taxonomy"
              purpose: "implement"

        - scope: "root"
          allowed:
            [
              "taxonomy",
              "contract",
              "capabilities",
              "infrastructure",
              "agent",
              "surfaces",
            ]
          mandatory: ["taxonomy", "contract(aggregate)"]
          forbidden: []
          allowed_imports:
            - layer: "taxonomy"
              purpose: "implement"
            - layer: "contract"
              purpose: "implement"
            - layer: "capabilities"
              purpose: "implement"
            - layer: "infrastructure"
              purpose: "implement"
            - layer: "agent"
              purpose: "implement"
            - layer: "surfaces"
              purpose: "implement"

    AES202:
      enabled: true
      scope:
        [
          "taxonomy",
