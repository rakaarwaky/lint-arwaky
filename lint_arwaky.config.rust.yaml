          "capabilities",
          "infrastructure",
          "agent",
          "surfaces",
        ]
      exceptions:
        [
          "main.rs",
          "lib.rs",
          "mod.rs",
          "root_cli_main_entry.rs",
          "root_mcp_main_entry.rs",
          "root_tui_main_entry.rs",
        ]

    AES024:
      enabled: true
      scope:
        [
          "taxonomy",
          "contract",
          "capabilities",
          "infrastructure",
          "agent",
          "surfaces",
        ]
      exceptions:
        [
          "main.rs",
          "lib.rs",
          "mod.rs",
          "root_cli_main_entry.rs",
          "root_mcp_main_entry.rs",
          "root_tui_main_entry.rs",
        ]

    AES030:
      enabled: true
      scope:
        [
          "taxonomy",
          "contract",
          "capabilities",
          "infrastructure",
          "agent",
          "surfaces",
        ]
      entry_points:
         [
          "main.rs",
          "lib.rs",
          "mod.rs",
          "root_cli_main_entry.rs",
          "root_mcp_main_entry.rs",
          "root_tui_main_entry.rs",
        ]

    AES013:
      enabled: true
      scope: ["contract"]
      forbidden_inheritance: ["contract(port)", "contract(protocol)"]
