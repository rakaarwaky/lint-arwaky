thresholds:
  score: 100.0
  complexity: 15

output_dir: "output"

adapters:
  - name: "eslint"
    weight: 1.0
  - name: "tsc"
    weight: 1.0
  - name: "prettier"
    weight: 1.0
  - name: "architecture"
    weight: 3.0

ignored_rules: []

ignored_paths:
  - "./output"
  - "/.git"
  - "/.github"
  - "/scratch"
  - "/node_modules"
  - "/dist"
  - "/build"
  - "/.tsbuildinfo"
  - "/.next"
  - "/coverage"

architecture:
  enabled: true
  layers:
    root:
      suffix:
        - strict: ["entry", "container"]
    taxonomy:
      suffix:
        - strict:
            ["vo", "entity", "error", "event", "constant", "utility", "helper"]
    contract:
      suffix:
        - strict: ["port", "protocol", "aggregate"]
    capabilities:
      suffix:
        - flexible:
            [
              "analyzer",
              "checker",
              "processor",
              "evaluator",
              "resolver",
              "validator",
              "formatter",
              "executor",
              "transformer",
              "calculator",
              "builder",
              "compiler",
              "aggregator",
              "classifier",
              "extractor",
              "reporter",
              "mapper",
              "filter",
              "collector",
              "comparator",
              "scorer",
              "inspector",
              "reviewer",
              "assessor",
              "auditor",
              "actions",
            ]
        - forbidden:
            [
              "vo",
              "entity",
              "error",
              "event",
              "constant",
              "constants",
              "utility",
              "helper",
              "port",
              "protocol",
              "aggregate",
            ]
    infrastructure:
      suffix:
        - flexible:
            [
              "adapter",
              "provider",
              "scanner",
              "client",
              "schemas",
              "lifespan",
              "wrapper",
              "tracer",
              "tracker",
              "variants",
              "detector",
              "patterns",
              "util",
              "system",
              "repository",
              "cache",
              "loader",
              "writer",
              "reader",
              "driver",
              "connector",
              "gateway",
              "serializer",
              "encoder",
              "decoder",
              "fetcher",
              "watcher",
              "indexer",
              "dispatcher",
              "recorder",
              "proxy",
              "publisher",
              "subscriber",
              "listener",
              "poller",
              "streamer",
            ]
        - forbidden:
            [
              "vo",
              "entity",
              "error",
              "event",
              "constant",
              "constants",
              "utility",
              "helper",
              "port",
              "protocol",
              "aggregate",
            ]
    surfaces:
      suffix:
        - strict:
            [
              "command",
              "controller",
              "page",
              "view",
              "component",
              "router",
              "layout",
              "hook",
              "store",
              "action",
              "screen",
            ]
    agent:
      suffix:
        - strict: ["orchestrator"]

  rules:
    AES201:
      enabled: true
      scope:
        [
          "taxonomy",
          "contract",
          "capabilities",
          "infrastructure",
          "agent",
          "surfaces",
        ]
      exceptions:
        [
          "index.ts",
          "index.js",
          "index.tsx",
          "index.jsx",
          "main.ts",
          "main.js",
          "cli_main_entry.ts",
          "cli_main_entry.js",
          "mcp_main_entry.ts",
          "mcp_main_entry.js",
          "tui_main_entry.ts",
          "tui_main_entry.js",
        ]
      conditions:
        - scope: "taxonomy(vo)"
          allowed: ["taxonomy"]
          mandatory: null
          forbidden:
            [
              "agent",
              "infrastructure",
              "surfaces",
              "contract",
              "capabilities",
              "root",
            ]

        - scope: "taxonomy(entity,error,event)"
          allowed: ["taxonomy"]
          mandatory: ["taxonomy(vo|constant)"]
          forbidden:
            [
              "agent",
              "infrastructure",
              "surfaces",
              "contract",
              "capabilities",
              "root",
            ]

        - scope: "taxonomy(constant)"
          allowed: ["taxonomy"]
          mandatory: null
          forbidden:
            [
              "agent",
              "infrastructure",
              "surfaces",
              "contract",
              "capabilities",
              "root",
            ]

        - scope: "contract(port|protocol)"
          allowed: ["taxonomy", "contract"]
          mandatory: ["taxonomy"]
          forbidden:
            [
              "agent",
              "infrastructure",
              "surfaces",
              "capabilities",
              "contract(aggregate)",
              "root",
            ]

        - scope: "contract(aggregate)"
          allowed: ["taxonomy", "contract"]
          mandatory: ["taxonomy"]
          forbidden:
            ["agent", "infrastructure", "surfaces", "capabilities", "root"]
          forbidden_inheritance: ["contract(port)", "contract(protocol)"]

        - scope: "capabilities"
          allowed: ["taxonomy", "contract"]
          mandatory: ["taxonomy"]
          forbidden:
            ["infrastructure", "surfaces", "agent", "capabilities", "root"]

        - scope: "infrastructure"
          allowed: ["taxonomy", "contract"]
          mandatory: ["taxonomy"]
          forbidden:
            ["surfaces", "capabilities", "agent", "infrastructure", "root"]

        - scope: "agent(orchestrator)"
          allowed:
            [
              "taxonomy",
              "contract(aggregate)",
              "contract(port)",
              "contract(protocol)",
            ]
          mandatory: ["taxonomy", "contract(aggregate)"]
          forbidden: ["surfaces", "infrastructure", "capabilities", "root"]

        - scope: "surfaces(command|controller|page|)"
          allowed: ["taxonomy", "contract"]
          mandatory: null
          forbidden:
            [
              "agent",
              "infrastructure",
              "capabilities",
              "contract(port)",
              "contract(protocol)",
              "root",
            ]

        - scope: "surfaces(hook|store|action|screen|router)"
          allowed: ["taxonomy"]
          mandatory: null
          forbidden:
            [
              "agent",
              "infrastructure",
              "capabilities",
              "contract(port)",
              "contract(protocol)",
              "surfaces(command|controller|page|entry)",
              "root",
            ]

        - scope: "surfaces(component|view|layout)"
          allowed: ["taxonomy"]
          mandatory: null
          forbidden:
            [
              "agent",
              "contract",
              "infrastructure",
              "capabilities",
              "surfaces(command|controller|page|entry|hook|store|action|screen|router)",
              "root",
            ]

