[mypy]
python_version = 3.12
mypy_path = src
explicit_package_bases = True
ignore_missing_imports = True

[mypy-tests.*]
ignore_errors = True

[mypy-yaml.*]
ignore_missing_imports = True

[mypy-tomli.*]
ignore_missing_imports = True

[mypy-jinja2.*]
ignore_missing_imports = True

[mypy-dotenv.*]
ignore_missing_imports = True
