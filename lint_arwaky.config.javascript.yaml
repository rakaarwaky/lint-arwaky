thresholds:
  score: 100.0
  complexity: 15

output_dir: "output"

adapters:
  - name: "eslint"
    weight: 1.0
  - name: "tsc"
    weight: 1.0
  - name: "prettier"
    weight: 1.0
  - name: "architecture"
    weight: 3.0

ignored_rules: []

ignored_paths:
  - "./output"
  - "/.git"
  - "/.github"
  - "/scratch"
  - "/node_modules"
  - "/dist"
  - "/build"
  - "/.tsbuildinfo"
  - "/.next"
  - "/coverage"

architecture:
  enabled: true
  layers:
    root:
      suffix:
        - strict: ["entry"]
    taxonomy:
      suffix:
        - strict: ["vo", "entity", "error", "event", "constant"]
    contract:
      suffix:
        - strict: ["port", "protocol", "aggregate"]
    capabilities:
      suffix:
        - flexible:
            ["analyzer", "checker", "processor", "evaluator", "resolver",
             "validator", "formatter", "executor", "transformer",
             "calculator", "builder", "compiler", "aggregator", "classifier",
             "extractor", "reporter", "mapper", "filter", "collector",
             "comparator", "scorer", "inspector", "reviewer", "assessor", "actions"]
        - forbidden: ["vo", "entity", "error", "event", "port", "protocol", "aggregate", "io"]
    infrastructure:
      suffix:
        - flexible:
            ["adapter", "provider", "scanner", "client", "constants", "schemas",
             "lifespan", "wrapper", "tracer", "tracker", "variants", "detector",
             "patterns", "util", "system", "repository", "cache", "loader",
             "writer", "reader", "driver", "connector", "gateway", "serializer",
             "encoder", "decoder", "fetcher", "watcher", "indexer", "dispatcher",
             "recorder", "proxy", "publisher", "subscriber", "listener", "poller", "streamer"]
        - forbidden: ["vo", "entity", "error", "event", "port", "protocol", "aggregate", "io"]
    surfaces:
      suffix:
        - strict:
            ["command", "controller", "page", "view", "component",
             "router", "layout", "entry", "hook", "store", "action", "screen"]
    agent:
      suffix:
        - strict:
            ["container", "manager", "orchestrator", "registry", "coordinator",
             "mixin", "state"]

  rules:
    AES001:
      enabled: true
      scope: ["taxonomy", "contract", "capabilities", "infrastructure", "agent", "surfaces"]
      exceptions: ["index.ts", "index.js", "index.tsx", "index.jsx"]
      conditions:
        - scope: "taxonomy(vo)"
          forbidden: ["agent", "infrastructure", "surfaces", "contract", "capabilities", "root"]
        - scope: "taxonomy(entity,error,event)"
          forbidden: ["agent", "infrastructure", "surfaces", "contract", "capabilities", "root"]
          mandatory: ["taxonomy(vo|constant)"]
        - scope: "taxonomy(constant)"
          forbidden: ["agent", "infrastructure", "surfaces", "contract", "capabilities", "root"]
        - scope: "contract(port|protocol)"
          forbidden: ["agent", "infrastructure", "surfaces", "capabilities", "contract(aggregate)", "root"]
          mandatory: ["taxonomy"]
        - scope: "contract(aggregate)"
          forbidden: ["agent", "infrastructure", "surfaces", "capabilities", "root"]
          mandatory: ["taxonomy", "contract(port|protocol|aggregate)"]
        - scope: "capabilities"
          forbidden: ["infrastructure", "surfaces", "agent", "capabilities", "root"]
          mandatory: ["taxonomy", "contract(protocol)"]
        - scope: "infrastructure"
          forbidden: ["surfaces", "capabilities", "agent", "infrastructure", "root"]
          mandatory: ["taxonomy", "contract(port)"]
        - scope: "agent(container|registry|mixin)"
          forbidden: ["surfaces", "root"]
          mandatory: ["taxonomy", "contract"]
        - scope: "agent(orchestrator|coordinator)"
          forbidden: ["surfaces", "agent(orchestrator|coordinator|manager|handler|result|state)", "agent(container|registry|mixin)", "root"]
          mandatory: ["taxonomy", "contract(aggregate)"]
        - scope: "agent(manager|state)"
          forbidden: ["agent", "infrastructure", "capabilities", "surfaces", "root"]
          mandatory: ["taxonomy", "contract(aggregate)"]
        - scope: "surfaces(command|controller|page|entry)"
          forbidden: ["agent", "infrastructure", "capabilities", "contract(port)", "contract(protocol)", "root"]
          mandatory: ["taxonomy", "contract(aggregate)"]
        - scope: "surfaces(hook|store|action|screen|router)"
          forbidden: ["agent", "infrastructure", "capabilities", "contract(port)", "contract(protocol)", "surfaces(command|controller|page|entry)", "root"]
        - scope: "surfaces(component|view|layout)"
          forbidden: ["agent", "contract", "infrastructure", "capabilities", "surfaces(command|controller|page|entry|hook|store|action|screen|router)", "root"]
          mandatory: ["taxonomy"]

    AES002:
      enabled: true
      scope: ["taxonomy", "contract", "capabilities", "infrastructure", "agent", "surfaces"]
      exceptions: ["index.ts", "index.js", "index.tsx", "index.jsx"]

    AES010:
      enabled: true
      scope: ["taxonomy", "contract", "capabilities", "infrastructure", "agent", "surfaces", "root"]
      exceptions: ["index.ts", "index.js", "index.tsx", "index.jsx"]

    AES011:
      enabled: true
      scope: ["taxonomy", "contract", "capabilities", "infrastructure", "agent", "surfaces", "root"]
      exceptions: ["index.ts", "index.js", "index.tsx", "index.jsx"]

    AES012:
      enabled: true
      scope: ["taxonomy", "contract", "capabilities", "infrastructure", "agent", "surfaces"]

    AES031:
      enabled: true
      scope: ["taxonomy(constant)", "contract", "taxonomy(entity,error,event)"]

    AES032:
      enabled: true
      scope: ["contract(aggregate)"]
      exceptions: ["index.ts", "index.js", "index.tsx", "index.jsx"]

    AES033:
      enabled: true
      scope: ["capabilities"]
      max_functions: 30
      max_impl: 5

    AES034:
      enabled: true
      scope: ["infrastructure", "capabilities", "agent"]
      exceptions: ["index.ts", "index.js", "index.tsx", "index.jsx"]

    AES035:
      enabled: true
      scope: ["agent(container|registry|mixin)", "agent(orchestrator|coordinator)", "agent(manager|state)"]
      max_lines: 300

    AES036:
      enabled: true
      scope: ["surfaces(command|controller|page|entry)", "surfaces(hook|store|action|screen|router)", "surfaces(component|view|layout)"]
      max_functions: 15

    AES020:
      enabled: true
      scope: ["taxonomy", "contract", "capabilities", "infrastructure", "agent", "surfaces"]
      max_lines: 700
      exceptions: ["index.ts", "index.js", "index.tsx", "index.jsx"]

    AES021:
      enabled: true
      scope: ["taxonomy", "contract", "capabilities", "infrastructure", "agent", "surfaces"]
      min_lines: 10
      exceptions: ["index.ts", "index.js", "index.tsx", "index.jsx"]

    AES022:
      enabled: true
      scope: ["taxonomy", "contract", "capabilities", "infrastructure", "agent", "surfaces"]
      patterns: ["// @ts-ignore", "// @ts-expect-error", "// @ts-nocheck", "// eslint-disable", "eslint-disable-next-line", "any", "as any"]
      exceptions: []

    AES023:
      enabled: true
      scope: ["taxonomy", "contract", "capabilities", "infrastructure", "agent", "surfaces"]

    AES024:
      enabled: true
      scope: ["taxonomy", "contract", "capabilities", "infrastructure", "agent", "surfaces"]
      exceptions: ["index.ts", "index.js", "index.tsx", "index.jsx"]

    AES030:
      enabled: true
      scope: ["taxonomy", "contract", "capabilities", "infrastructure", "agent", "surfaces"]
      entry_points: ["index.ts", "index.js", "index.tsx", "index.jsx"]
