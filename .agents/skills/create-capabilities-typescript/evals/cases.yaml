skill: create-capabilities-typescript
version: 1.4.0

cases:
  - id: good-01
    type: good
    description: "Capability with correct 3-block structure, DI, and shared VOs"
    file: capabilities_<name-capability>.ts
    expect: pass

  - id: bad-01
    type: bad
    description: "Capability without protocol interface (AES403)"
    expect: fail
    violation: AES403

  - id: bad-02
    type: bad
    description: "I/O in capabilities layer (AES404)"
    expect: fail
    violation: AES404

  - id: bad-03
    type: bad
    description: "Interface defined in capabilities layer"
    expect: fail
    violation: AES201
