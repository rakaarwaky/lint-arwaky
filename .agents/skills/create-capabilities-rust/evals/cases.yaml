skill: create-capabilities-rust
version: 1.3.0

cases:
  - id: good-01
    type: good
    description: "Capability with correct 3-block structure, DI, and shared VOs"
    file: capabilities_orphan_analyzer.rs
    expect: pass

  - id: good-02
    type: good
    description: "Stateless capability with no DI fields"
    file: arch_line_checker.rs
    expect: pass

  - id: bad-01
    type: bad
    description: "Capability without protocol trait (AES403)"
    file: bad_no_protocol.rs
    expect: fail
    violation: AES403

  - id: bad-02
    type: bad
    description: "I/O in capabilities layer (AES404)"
    file: bad_io_in_capabilities.rs
    expect: fail
    violation: AES404

  - id: bad-03
    type: bad
    description: "Data class defined in capabilities layer"
    file: bad_local_dataclass.rs
    expect: fail
    violation: AES201

  - id: bad-04
    type: bad
    description: "Concrete service field instead of DI"
    file: bad_concrete_field.rs
    expect: fail
    violation: AES403

  - id: bad-05
    type: bad
    description: "Std trait in Block 2"
    file: bad_wrong_block_order.rs
    expect: fail
    violation: STRUCTURE
