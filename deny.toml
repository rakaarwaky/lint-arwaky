# cargo-deny configuration
# See: https://embarkstudios.github.io/cargo-deny/

[advisories]
unmaintained = "all"
ignore = [
    # paste is unmaintained but only a transitive dep via ratatui; no direct usage.
    # Upstream issue: https://github.com/dtolnay/paste
    "RUSTSEC-2024-0436",
    # DNS rebinding vulnerability in rmcp Streamable HTTP server transport (rmcp v0.16.0)
    "RUSTSEC-2026-0189",
]
yanked = "warn"

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "0BSD",
    "BSL-1.0",
    "CC0-1.0",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
]

[bans]
multiple-versions = "warn"
wildcards = "warn"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
