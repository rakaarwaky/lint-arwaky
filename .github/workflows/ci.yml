name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 1
  CARGO_BUILD_JOBS: 4
  RUST_MIN_STACK: 33554432
  RUSTFLAGS: "-C link-arg=-fuse-ld=mold"

jobs:
  # ─── Job 1: Lint (fmt + clippy in parallel) ──────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install mold linker
        run: sudo apt-get update && sudo apt-get install -y mold

      - name: Cache cargo (debug)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/debug
          key: ${{ runner.os }}-cargo-debug-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-debug-

      - name: rustfmt
        run: cargo fmt --all -- --check

      - name: clippy
        uses: actions-rs/clippy-check@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          args: --all-targets -- -D warnings

  # ─── Job 2: Tests (uses debug cache from lint) ───────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install mold linker
        run: sudo apt-get update && sudo apt-get install -y mold

      - name: Cache cargo (debug)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/debug
          key: ${{ runner.os }}-cargo-debug-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-debug-

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Run tests (nextest)
        run: cargo nextest run --workspace --lib --tests

  # ─── Job 3: Compliance (self-lint + AES codes, parallel) ─
  compliance:
    name: AES Compliance
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install mold linker
        run: sudo apt-get update && sudo apt-get install -y mold

      - name: Cache cargo (release)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/release
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-

      - name: Build release CLI
        run: cargo build --release --bin lint-arwaky-cli

      - name: AES self-lint
        run: ./target/release/lint-arwaky-cli check .

      - name: AES test-workspace coverage
        run: |
          OUTPUT=$(./target/release/lint-arwaky-cli scan test-workspaces 2>&1) || true
          echo "$OUTPUT"
          UNIQUE_AES=$(echo "$OUTPUT" | grep -oP 'AES\d+' | sort -u | wc -l)
          echo "Unique AES codes detected: $UNIQUE_AES"
          if [ "$UNIQUE_AES" -lt 24 ]; then
            echo "FAIL: only $UNIQUE_AES unique AES codes (minimum 24 required)"
            exit 1
          fi
          echo "PASS: Detected $UNIQUE_AES unique AES codes (>= 24)"

  # ─── Job 4: Audit ────────────────────────────────────────
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: cargo deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check

  # ─── Job 5: Release (only on main, after all gates) ──────
  release:
    name: Release Binary
    runs-on: ubuntu-latest
    needs: [lint, test, compliance, audit]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install mold linker
        run: sudo apt-get update && sudo apt-get install -y mold

      - name: Cache cargo (release)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/release
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-

      - name: Build release
        run: cargo build --release

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: lint-arwaky-cli
          path: target/release/lint-arwaky-cli
          retention-days: 30
