name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

env:
  CARGO_TERM_COLOR: always

jobs:
  quality-gates:
    name: Quality Gates
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # Gate 1: Format check
      - name: Gate 1 — rustfmt
        run: cargo fmt --all -- --check

      # Gate 2: Clippy
      - name: Gate 2 — clippy
        run: cargo clippy --all-targets -- -D warnings

      # Gate 3: Build
      - name: Gate 3 — build
        run: cargo build --release

      # Gate 4: Tests
      - name: Gate 4 — tests
        run: cargo test --workspace

      # Gate 5: AES self-lint
      - name: Gate 5 — AES compliance
        run: ./target/release/lint-arwaky-cli check .

      # Gate 6: Test-workspace AES coverage (per-workspace)
      - name: Gate 6 — test-workspace AES coverage
        run: |
          ALL_PASS=true
          for SP in test-workspaces/crates test-workspaces/modules test-workspaces/packages; do
            OUTPUT=$(./target/release/lint-arwaky-cli scan "$SP" 2>&1) || true
            echo "$OUTPUT"
            UNIQUE_AES=$(echo "$OUTPUT" | grep -oP 'Total Unique AES Codes:\s*\K[0-9]+' || echo "0")
            NAME=$(basename "$SP")
            echo "  $NAME: $UNIQUE_AES unique AES codes"
            if [ "$UNIQUE_AES" -lt 24 ]; then
              echo "FAIL: $NAME only $UNIQUE_AES unique AES codes (minimum 24)"
              ALL_PASS=false
            fi
          done
          if [ "$ALL_PASS" = false ]; then
            exit 1
          fi
          echo "PASS: All workspaces have >= 24 unique AES codes"

      # Gate 7: Dependency audit
      - name: Gate 7 — cargo deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check

  release:
    name: Release Binary
    runs-on: ubuntu-latest
    needs: quality-gates
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build release
        run: cargo build --release

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: lint-arwaky-cli
          path: target/release/lint-arwaky-cli
          retention-days: 30
