name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write
  attestations: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build release binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release --all-targets
      - run: cp target/release/lint-arwaky-cli lint-arwaky-cli
      - run: cp target/release/lint-arwaky-mcp lint-arwaky-mcp
      - uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: |
            lint-arwaky-cli
            lint-arwaky-mcp

  smoke-test:
    name: Smoke test binaries
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: binaries
      - run: chmod +x lint-arwaky-cli lint-arwaky-mcp
      - run: ./lint-arwaky-cli --version
      - run: ./lint-arwaky-cli --help
      - run: ./lint-arwaky-cli report . --output-format json | grep '"score"'

  provenance:
    name: Generate SLSA provenance
    runs-on: ubuntu-latest
    needs: build
    permissions:
      attestations: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: binaries
          path: release-assets
      - uses: actions/attest-build-provenance@v2
        with:
          subject-path: "release-assets/*"

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [smoke-test, provenance]
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: binaries
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            lint-arwaky-cli
            lint-arwaky-mcp
          generate_release_notes: true
